        }
        function initChatGPTFog(container) {
          const fogCanvas = container.querySelector('[data-role="maze-fog"]');
          const mapContainer = container.querySelector(
            ".chatgpt-maze__map-container",
          );

          // 设置canvas覆盖整个地图容器
          fogCanvas.style.position = "absolute";
          fogCanvas.style.inset = "0";
          fogCanvas.style.width = "100%";
          fogCanvas.style.height = "100%";
        }

        function updateChatGPTFog(container) {
          const fogCanvas = container.querySelector('[data-role="maze-fog"]');
          const mapEl = container.querySelector('[data-role="maze-map"]');
          const mapContainer = container.querySelector(
            ".chatgpt-maze__map-container",
          );

          // 获取容器实际尺寸
          const containerRect = mapContainer.getBoundingClientRect();
          const canvasWidth = containerRect.width;
          const canvasHeight = containerRect.height;

          // 设置canvas实际像素尺寸（考虑设备像素比）
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          fogCanvas.width = canvasWidth * dpr;
          fogCanvas.height = canvasHeight * dpr;

          const ctx = fogCanvas.getContext("2d");
          ctx.scale(dpr, dpr);

          // 获取地图在容器中的偏移
          const mapRect = mapEl.getBoundingClientRect();
          const mapOffsetX = mapRect.left - containerRect.left;
          const mapOffsetY = mapRect.top - containerRect.top;
          const mapWidth = chatgptMazeCols * CHATGPT_CELL_SIZE;
          const mapHeight = chatgptMazeRows * CHATGPT_CELL_SIZE;

          // 玩家在canvas中的中心位置
          const playerCenterX =
            mapOffsetX + (chatgptPlayerCol + 0.5) * CHATGPT_CELL_SIZE;
          const playerCenterY =
            mapOffsetY + (chatgptPlayerRow + 0.5) * CHATGPT_CELL_SIZE;

          // 根据朝向计算视野参数
          const directionAngles = {
            up: -Math.PI / 2,
            down: Math.PI / 2,
            left: Math.PI,
            right: 0,
          };
          const facingAngle =
            directionAngles[chatgptPlayerDirection] || Math.PI / 2;

          // 视野参数
          const baseRadius = CHATGPT_CELL_SIZE * 3; // 基础圆形视野
          const forwardRadius = CHATGPT_CELL_SIZE * 6; // 面朝方向的延伸
          const coneAngle = Math.PI * 0.6; // 前方锥形张角

          // 清空并填充全黑
          ctx.fillStyle = "rgba(0, 0, 0, 1)";
          ctx.fillRect(0, 0, canvasWidth, canvasHeight);

          // 使用 destination-out 模式来"挖洞"
          ctx.globalCompositeOperation = "destination-out";

          // 第一层：基础圆形视野（带射线遮挡检测）
          drawVisibilityArea(
            ctx,
            playerCenterX,
            playerCenterY,
            baseRadius,
            mapOffsetX,
            mapOffsetY,
          );

          // 第二层：面朝方向的锥形延伸视野
          drawDirectionalCone(
            ctx,
            playerCenterX,
            playerCenterY,
            facingAngle,
            forwardRadius,
            coneAngle,
            mapOffsetX,
            mapOffsetY,
          );

          // 恢复混合模式
          ctx.globalCompositeOperation = "source-over";

          // 添加边缘渐变效果
          addFogGradient(
            ctx,
            playerCenterX,
            playerCenterY,
            baseRadius,
            forwardRadius,
            canvasWidth,
            canvasHeight,
          );
        }

        function drawVisibilityArea(
          ctx,
          cx,
          cy,
          radius,
          mapOffsetX,
          mapOffsetY,
        ) {
          const rayCount = 120;
          const rayStep = (Math.PI * 2) / rayCount;

          ctx.beginPath();
          ctx.moveTo(cx, cy);

          for (let i = 0; i <= rayCount; i++) {
            const angle = i * rayStep;
            const point = castRay(
              cx,
              cy,
              angle,
              radius,
              mapOffsetX,
              mapOffsetY,
            );
            ctx.lineTo(point.x, point.y);
          }

          ctx.closePath();

          // 使用渐变填充
          const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
          gradient.addColorStop(0, "rgba(255, 255, 255, 1)");
          gradient.addColorStop(0.7, "rgba(255, 255, 255, 0.8)");
          gradient.addColorStop(1, "rgba(255, 255, 255, 0)");

          ctx.fillStyle = gradient;
          ctx.fill();
        }

        function drawDirectionalCone(
          ctx,
          cx,
          cy,
          facingAngle,
          radius,
          coneAngle,
          mapOffsetX,
          mapOffsetY,
        ) {
          const rayCount = 40;
          const startAngle = facingAngle - coneAngle / 2;
          const rayStep = coneAngle / rayCount;

          ctx.beginPath();
          ctx.moveTo(cx, cy);

          for (let i = 0; i <= rayCount; i++) {
            const angle = startAngle + i * rayStep;
            const point = castRay(
              cx,
              cy,
              angle,
              radius,
              mapOffsetX,
              mapOffsetY,
            );
            ctx.lineTo(point.x, point.y);
          }

          ctx.closePath();

          // 锥形渐变
          const gradient = ctx.createRadialGradient(
            cx,
            cy,
            CHATGPT_CELL_SIZE * 2,
            cx,
            cy,
            radius,
          );
          gradient.addColorStop(0, "rgba(255, 255, 255, 0.6)");
          gradient.addColorStop(0.6, "rgba(255, 255, 255, 0.3)");
          gradient.addColorStop(1, "rgba(255, 255, 255, 0)");

          ctx.fillStyle = gradient;
          ctx.fill();
        }

        function castRay(cx, cy, angle, maxDist, mapOffsetX, mapOffsetY) {
          const stepSize = CHATGPT_CELL_SIZE / 3;
          let dist = 0;
          let x = cx;
          let y = cy;

          const cosA = Math.cos(angle);
          const sinA = Math.sin(angle);

          while (dist < maxDist) {
            x += cosA * stepSize;
            y += sinA * stepSize;
            dist += stepSize;

            // 转换为地图格子坐标
            const mapX = x - mapOffsetX;
            const mapY = y - mapOffsetY;
            const col = Math.floor(mapX / CHATGPT_CELL_SIZE);
            const row = Math.floor(mapY / CHATGPT_CELL_SIZE);

            // 检查是否在地图范围内
            if (
              row < 0 ||
              row >= chatgptMazeRows ||
              col < 0 ||
              col >= chatgptMazeCols
            ) {
              break;
            }

            // 检查是否碰到屋顶
            if (chatgptMazeMap[row][col].type === "roof") {
              // 稍微回退，不要完全进入墙内
              x -= cosA * stepSize * 0.3;
              y -= sinA * stepSize * 0.3;
              break;
            }
          }

          return { x, y };
        }

        function addFogGradient(
          ctx,
          cx,
          cy,
          baseRadius,
          forwardRadius,
          canvasWidth,
          canvasHeight,
        ) {
          // 在整个视野边缘添加柔和的渐变
          const maxRadius = forwardRadius * 1.2;

          ctx.globalCompositeOperation = "source-atop";

          const gradient = ctx.createRadialGradient(
            cx,
            cy,
            baseRadius * 0.5,
            cx,
            cy,
            maxRadius,
          );
          gradient.addColorStop(0, "rgba(0, 0, 0, 0)");
          gradient.addColorStop(0.5, "rgba(0, 0, 0, 0.1)");
          gradient.addColorStop(0.8, "rgba(0, 0, 0, 0.4)");
          gradient.addColorStop(1, "rgba(0, 0, 0, 0.8)");

          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvasWidth, canvasHeight);

          ctx.globalCompositeOperation = "source-over";
        }

        function moveChatGPTPlayer(direction) {
          if (chatgptIsRecording) return;

          const now = Date.now();
          if (now - chatgptLastMoveTime < CHATGPT_MOVE_INTERVAL) return;

          let dr = 0,
            dc = 0;

          switch (direction) {
            case "up":
              dr = -1;
              break;
            case "down":
              dr = 1;
              break;
            case "left":
              dc = -1;
              break;
            case "right":
              dc = 1;
              break;
            default:
              return;
          }

          // 更新朝向（即使不能移动也更新）
          chatgptPlayerDirection = direction;

          const newRow = chatgptPlayerRow + dr;
          const newCol = chatgptPlayerCol + dc;

          // 严格边界检查
          if (
            newRow < 0 ||
            newRow >= chatgptMazeRows ||
            newCol < 0 ||
            newCol >= chatgptMazeCols
          ) {
            // 只更新朝向和视觉
            updatePlayerVisuals();
            return;
          }

          // 检查目标格子是否可通行
          if (chatgptMazeMap[newRow][newCol].type === "roof") {
            // 只更新朝向和视觉
            updatePlayerVisuals();
            return;
          }

          // 可以移动
          chatgptLastMoveTime = now;
          chatgptPlayerMoving = true;
          chatgptPlayerRow = newRow;
          chatgptPlayerCol = newCol;

          updatePlayerVisuals();

          // 移动动画结束
          setTimeout(() => {
            chatgptPlayerMoving = false;
            updatePlayerVisuals();
          }, CHATGPT_MOVE_DURATION);
        }

        function updatePlayerVisuals() {
          const container = fightContent.querySelector(".chatgpt-maze");
          if (!container) return;

          const playerEl = container.querySelector('[data-role="maze-player"]');
          if (playerEl) {
            updateChatGPTPlayerSprite(playerEl);
            updateChatGPTPlayerPosition(playerEl);
          }

          updateChatGPTFog(container);
          updateRecordButtonState(container);
        }

        function startContinuousMove(direction) {
          // 立即移动一次
          moveChatGPTPlayer(direction);

          // 清除之前的定时器
          if (chatgptMoveTimer) {
            clearInterval(chatgptMoveTimer);
          }

          // 设置持续移动
          chatgptMoveTimer = setInterval(() => {
            if (chatgptKeysPressed.has(direction)) {
              moveChatGPTPlayer(direction);
            } else {
              clearInterval(chatgptMoveTimer);
              chatgptMoveTimer = null;
            }
          }, CHATGPT_MOVE_INTERVAL);
        }

        function stopContinuousMove(direction) {
          chatgptKeysPressed.delete(direction);

          if (chatgptKeysPressed.size === 0 && chatgptMoveTimer) {
            clearInterval(chatgptMoveTimer);
            chatgptMoveTimer = null;
          }
        }

        function tryRecordDamage() {
          if (chatgptIsRecording) return;

          const cellData = chatgptMazeMap[chatgptPlayerRow][chatgptPlayerCol];
          const key = `${chatgptPlayerRow},${chatgptPlayerCol}`;

          if (cellData.damage > 0 && !chatgptRecordedSet.has(key)) {
            chatgptIsRecording = true;

            const container = fightContent.querySelector(".chatgpt-maze");
            if (container) {
              const playerEl = container.querySelector(
                '[data-role="maze-player"]',
              );
              if (playerEl) {
                updateChatGPTPlayerSprite(playerEl);
              }
              updateRecordButtonState(container);
            }

            // 缩短记录时间
            setTimeout(() => {
              chatgptRecordedSet.add(key);
              cellData.recorded = true;
              chatgptRecordedCount++;
              chatgptIsRecording = false;

              const container = fightContent.querySelector(".chatgpt-maze");
              if (container) {
                // 更新进度显示
                const progressEl = container.querySelector(
                  '[data-role="maze-progress"]',
                );
                if (progressEl) {
                  progressEl.textContent = `${chatgptRecordedCount} / ${CHATGPT_REQUIRED_RECORDS}`;
                  // 添加闪烁效果
                  progressEl.style.animation = "none";
                  progressEl.offsetHeight; // 触发重绘
                  progressEl.style.animation = "progress-flash 0.3s ease-out";
                }

                // 更新格子显示
                const cell = container.querySelector(
                  `.chatgpt-maze__cell[data-row="${chatgptPlayerRow}"][data-col="${chatgptPlayerCol}"]`,
                );
                if (cell) {
                  cell.classList.add("chatgpt-maze__cell--recorded");
                  cell.classList.remove("chatgpt-maze__cell--current-damage");
                  const excl = cell.querySelector(".chatgpt-maze__exclamation");
                  if (excl) excl.remove();
                }

                const playerEl = container.querySelector(
                  '[data-role="maze-player"]',
                );
                if (playerEl) {
                  updateChatGPTPlayerSprite(playerEl);
                }

                updateRecordButtonState(container);
              }

              // 检查是否完成
              if (chatgptRecordedCount >= CHATGPT_REQUIRED_RECORDS) {
                endChatGPTFight(true);
              }
            }, 500); // 从1000ms减少到500ms
          }
        }

        function updateChatGPTTimer(container) {
          const timerEl = container.querySelector('[data-role="maze-timer"]');
          const timeEl = container.querySelector('[data-role="maze-time"]');

          if (timeEl) {
            timeEl.textContent = chatgptTimeLeft;
          }

          if (timerEl) {
            if (chatgptTimeLeft <= 10) {
              timerEl.classList.add("chatgpt-maze__timer--danger");
            } else {
              timerEl.classList.remove("chatgpt-maze__timer--danger");
            }
          }
        }

        function startChatGPTMaze() {
          generateChatGPTMaze();

          fightContent.innerHTML = "";
          const mazeUI = createChatGPTMazeUI();
          fightContent.appendChild(mazeUI);

          renderChatGPTMaze(mazeUI);
          updateChatGPTTimer(mazeUI);

          // 绑定移动端控制按钮（支持长按）
          const controlBtns = mazeUI.querySelectorAll("[data-maze-dir]");
          controlBtns.forEach((btn) => {
            const dir = btn.dataset.mazeDir;

            if (dir === "record") {
              btn.addEventListener("click", () => tryRecordDamage());
              btn.addEventListener(
                "touchstart",
                (e) => {
                  e.preventDefault();
                  tryRecordDamage();
                },
                { passive: false },
              );
            } else {
              // 方向按钮支持长按
              let touchInterval = null;

              const startMove = (e) => {
                e.preventDefault();
                moveChatGPTPlayer(dir);

                // 长按持续移动
                if (touchInterval) clearInterval(touchInterval);
                touchInterval = setInterval(() => {
                  moveChatGPTPlayer(dir);
                }, CHATGPT_MOVE_INTERVAL);
              };

              const stopMove = () => {
                if (touchInterval) {
                  clearInterval(touchInterval);
                  touchInterval = null;
                }
              };

              btn.addEventListener("mousedown", startMove);
              btn.addEventListener("mouseup", stopMove);
              btn.addEventListener("mouseleave", stopMove);

              btn.addEventListener("touchstart", startMove, { passive: false });
              btn.addEventListener("touchend", stopMove);
              btn.addEventListener("touchcancel", stopMove);
            }
          });

          // 启动计时器
          chatgptTimer = setInterval(() => {
            chatgptTimeLeft--;
            const container = fightContent.querySelector(".chatgpt-maze");
            if (container) {
              updateChatGPTTimer(container);
            }

            if (chatgptTimeLeft <= 0) {
              endChatGPTFight(false);
            }
          }, 1000);
        }

        function endChatGPTFight(victory) {
          // 清理所有定时器
          if (chatgptTimer) {
            clearInterval(chatgptTimer);
            chatgptTimer = null;
          }
          if (chatgptMoveTimer) {
            clearInterval(chatgptMoveTimer);
            chatgptMoveTimer = null;
          }
          chatgptKeysPressed.clear();

          if (victory) {
            fightOverlay.classList.remove("fight-overlay--open");
            fightContent.innerHTML = "";
            isFighting = false;
            fightResolved = true;

            bossDefeated.chatgpt = true;
            advanceProgress("boss_defeat", { boss: "chatgpt" });
            updateBackground();
            unlockMovement();
            refreshAmbientBgm();

            showDialogs(
              [{ text: "你记录下了所有损坏点。豆包的结界被打破了！" }],
              () => {
                updateEntityState("shangxiahang", "repair");
                pendingRepairGucuo = "shangxiahang";
              },
            );
          } else {
            fightOverlay.classList.remove("fight-overlay--open");
            fightContent.innerHTML = "";
            isFighting = false;
            fightResolved = true;

            playChatGPTDeathAnimation();
          }
        }

        function playChatGPTDeathAnimation() {
          chatgptDeathScene.classList.add("chatgpt-death-scene--active");
          chatgptDeathPlayer.classList.remove(
            "chatgpt-death-scene__player--suicide",
          );
          chatgptDeathPlayer.classList.add(
            "chatgpt-death-scene__player--standing",
          );
          chatgptDeathText.classList.remove(
            "chatgpt-death-scene__text--visible",
          );
          chatgptDeathText.textContent = "你被损坏之多震撼了...";

          setTimeout(() => {
            chatgptDeathText.classList.add(
              "chatgpt-death-scene__text--visible",
            );
          }, 500);

          setTimeout(() => {
            chatgptDeathText.textContent = "你选择用Glock解决问题...";
          }, 2000);

          setTimeout(() => {
            chatgptDeathPlayer.classList.remove(
              "chatgpt-death-scene__player--standing",
            );
            chatgptDeathPlayer.classList.add(
              "chatgpt-death-scene__player--suicide",
            );
          }, 3500);

          setTimeout(() => {
            chatgptDeathScene.classList.remove("chatgpt-death-scene--active");
            handleDeath(
              "你被损坏之多震撼了。你选择用Glock解决问题。",
              "suicide",
            );
          }, 5000);
        }

        function handleChatGPTKeyDown(e) {
          if (!isFighting || currentBoss !== "chatgpt") return;

          let direction = null;

          switch (e.key.toLowerCase()) {
            case "w":
            case "arrowup":
              e.preventDefault();
              direction = "up";
              break;
            case "s":
            case "arrowdown":
              e.preventDefault();
              direction = "down";
              break;
            case "a":
            case "arrowleft":
              e.preventDefault();
              direction = "left";
              break;
            case "d":
            case "arrowright":
              e.preventDefault();
              direction = "right";
              break;
            case " ":
              e.preventDefault();
              tryRecordDamage();
              return;
          }

          if (direction && !chatgptKeysPressed.has(direction)) {
            chatgptKeysPressed.add(direction);
            startContinuousMove(direction);
          }
        }

        function handleChatGPTKeyUp(e) {
          if (!isFighting || currentBoss !== "chatgpt") return;

          let direction = null;

          switch (e.key.toLowerCase()) {
            case "w":
            case "arrowup":
              direction = "up";
              break;
            case "s":
            case "arrowdown":
              direction = "down";
              break;
            case "a":
            case "arrowleft":
              direction = "left";
              break;
            case "d":
            case "arrowright":
              direction = "right";
              break;
          }

          if (direction) {
            stopContinuousMove(direction);
          }
        }

        function createMinigame(bossId, onVictory, onDefeat) {
          const container = document.createElement("div");
          container.className = "fight-debug";

          const winBtn = document.createElement("button");
          winBtn.className = "fight-debug__btn fight-debug__btn--win";
          winBtn.textContent = "胜利";
          winBtn.onclick = () => onVictory();

          const loseBtn = document.createElement("button");
          loseBtn.className = "fight-debug__btn fight-debug__btn--lose";
          loseBtn.textContent = "失败";
          loseBtn.onclick = () => onDefeat();

          container.appendChild(winBtn);
          container.appendChild(loseBtn);

          return container;
        }

        function startFight(bossId) {
          if (bossDefeated[bossId]) return;

          lockMovement();
          currentBoss = bossId;
          isFighting = true;
          fightResolved = false;
          refreshAmbientBgm();

          const bossNames = {
            chatgpt: "守护者·豆包 - 损坏记录任务",
            gemini: "守护者·文心一言 - 徽派建筑问答",
            claude: "守护者·千问 - 修复棠樾牌坊的数字榫卯",
          };

          fightBossName.textContent = bossNames[bossId] || bossId;
          fightContent.innerHTML = "";

          fightOverlay.classList.add("fight-overlay--open");

          if (bossId === "chatgpt") {
            fightBossName.style.display = "none";
            startChatGPTMaze();
          } else if (bossId === "gemini") {
            fightBossName.style.display = "none";
            startGeminiQuiz();
          } else if (bossId === "claude") {
            fightBossName.style.display = "none";
            startClaudePuzzle();
          } else {
            fightBossName.style.display = "block";
            const minigame = createMinigame(
              bossId,
              () => endFight(true),
              () => endFight(false),
            );
            fightContent.appendChild(minigame);
          }
        }
        function endFight(victory) {
          if (fightResolved) return;
          fightResolved = true;

          fightOverlay.classList.remove("fight-overlay--open");
          fightContent.innerHTML = "";
          isFighting = false;
          unlockMovement();
          refreshAmbientBgm();

          if (victory) {
            bossDefeated[currentBoss] = true;
            advanceProgress("boss_defeat", { boss: currentBoss });
            updateBackground();
            handleFightVictory();
          } else {
            handleFightDefeat();
          }
        }

        function handleFightVictory() {
          const entityMap = {
            chatgpt: "shangxiahang",
            gemini: "zhuzifang",
            claude: "sanfangqixiang",
          };
          const entityId = entityMap[currentBoss];
          if (entityId) {
            updateEntityState(entityId, "repair");
            pendingRepairGucuo = entityId;
          }
        }

        function handleFightDefeat() {
          const msg = DEATH_MESSAGES[currentBoss] || "你暂时数据迷失。";
          handleDeath(msg, currentBoss === "gemini" ? "suicide" : "dead");
        }

        function startRepair(entity) {
          if (isRepairing || isDead) return;

          currentRepairEntity = entity;
          isRepairing = true;
          repairResolved = false;
          repairClickCount = 0;
          repairStartX = playerX;
          pendingRepairGucuo = null;

          if (entity.id === "shangxiahang") {
            repairClicksRequired = 20;
            repairTimeLeft = 0;
          } else if (entity.id === "zhuzifang") {
            // 调整：计时不宜过短，否则失败重试体感过强
            repairClicksRequired = 12;
            repairTimeLeft = 6.5;
          } else if (entity.id === "sanfangqixiang") {
            // 调整：点击次数过高且计时偏短，导致玩家很难通过
            repairClicksRequired = 30;
            repairTimeLeft = 14;
          }

          refreshAmbientBgm();
          player.classList.remove("player--walking");
          player.classList.add("player--fixing");

          const entityEl = gameWorld.querySelector(`[data-id="${entity.id}"]`);
          if (entityEl) {
            const repairBar = entityEl.querySelector(".repair-bar");
            const timerEl = entityEl.querySelector(
              '[data-role="repair-timer"]',
            );
            const clicksEl = entityEl.querySelector(
              '[data-role="repair-clicks"]',
            );

            if (repairBar) repairBar.classList.add("repair-bar--active");
            if (clicksEl)
              clicksEl.textContent = `${repairClickCount}/${repairClicksRequired}`;

            if (repairTimeLeft > 0 && timerEl) {
              timerEl.textContent = `${repairTimeLeft}s`;
              timerEl.style.display = "block";

              repairTimerId = setInterval(() => {
                repairTimeLeft -= 0.5;
                timerEl.textContent = `${repairTimeLeft.toFixed(1)}s`;
                if (repairTimeLeft <= 2)
                  timerEl.classList.add("repair-bar__timer--danger");
                if (repairTimeLeft <= 0) {
                  endRepair(false);
                }
              }, 500);
            } else if (timerEl) {
              timerEl.style.display = "none";
            }
          }
        }

        function handleRepairClick(entityId) {
          if (
            !isRepairing ||
            !currentRepairEntity ||
            currentRepairEntity.id !== entityId
          )
            return;

          repairClickCount++;
          updateRepairProgress();

          if (repairClickCount >= repairClicksRequired) {
            endRepair(true);
          }
        }

        function updateRepairProgress() {
          if (!currentRepairEntity) return;

          const entityEl = gameWorld.querySelector(
            `[data-id="${currentRepairEntity.id}"]`,
          );
          if (entityEl) {
            const fillEl = entityEl.querySelector('[data-role="repair-fill"]');
            const clicksEl = entityEl.querySelector(
              '[data-role="repair-clicks"]',
            );
            if (fillEl) {
              const percent = (repairClickCount / repairClicksRequired) * 100;
              fillEl.style.width = `${percent}%`;
            }
            if (clicksEl)
              clicksEl.textContent = `${repairClickCount}/${repairClicksRequired}`;
          }
        }

        function endRepair(success) {
          if (repairResolved) return;
          repairResolved = true;

          if (repairTimerId) {
            clearInterval(repairTimerId);
            repairTimerId = null;
          }

          const gucuoId = currentRepairEntity ? currentRepairEntity.id : "";
          const entityEl = gameWorld.querySelector(`[data-id="${gucuoId}"]`);

          if (entityEl) {
            const repairBar = entityEl.querySelector(".repair-bar");
            const timerEl = entityEl.querySelector(
              '[data-role="repair-timer"]',
            );
            if (repairBar) repairBar.classList.remove("repair-bar--active");
            if (timerEl) timerEl.classList.remove("repair-bar__timer--danger");
          }

          player.classList.remove("player--fixing");
          isRepairing = false;

          if (success) {
            updateEntityState(gucuoId, "repaired");

            if (gucuoId && !collectedRelics.includes(gucuoId)) {
              collectedRelics.push(gucuoId);
              advanceProgress("repair_complete", {
                gucuo_id: gucuoId,
                relic: gucuoId,
              });
              /* 父页面收集卡：第 1/2/3 张对应三次修复通关 */
              notifyParentCollectibleCard(collectedRelics.length);
            }

            currentRepairEntity = null;
            repairClickCount = 0;
            repairStartX = 0;
            refreshAmbientBgm();

            setEntityCooldown(gucuoId);
            repairedRecently[gucuoId] = Date.now();

            const completeDialogKey = `${gucuoId}_complete`;
            showDialogs(
              DIALOGS[completeDialogKey] || [
                { text: `修复完成。你获取了${RELIC_NAMES[gucuoId]}。` },
              ],
              () => {
                showRelic(gucuoId, () => {
                  updateHUD();
                  checkGameComplete();
                });
              },
            );
          } else {
            if (gucuoId === "zhuzifang") {
              if (entityEl) entityEl.classList.add("entity--shaking");
              setTimeout(() => {
                if (entityEl) entityEl.classList.remove("entity--shaking");
                updateEntityState(gucuoId, "collapse");
                player.classList.add("player--surprised");
                setTimeout(() => {
                  player.classList.remove("player--surprised");
                  currentRepairEntity = null;
                  repairClickCount = 0;
                  repairStartX = 0;
                  handleDeath(DEATH_MESSAGES.repair_collapse, "dead");
                }, 500);
              }, 1000);
            } else if (gucuoId === "sanfangqixiang") {
              currentRepairEntity = null;
              repairClickCount = 0;
              repairStartX = 0;
              handleDeath(DEATH_MESSAGES.repair_suicide, "suicide");
            } else {
              currentRepairEntity = null;
              repairClickCount = 0;
              repairStartX = 0;
              refreshAmbientBgm();
            }
          }
        }
        function checkAbandonRepair() {
          if (
            !pendingRepairGucuo ||
            isDead ||
            isRepairing ||
            isDialogOpen ||
            isStoryPlaying ||
            isFighting
          )
            return;

          const entity = getEntityById(pendingRepairGucuo);
          if (!entity || entity.state !== "repair") {
            pendingRepairGucuo = null;
            return;
          }

          const dist = Math.abs(playerX - entity.x);
          if (dist > CONFIG.suicideDistance) {
            pendingRepairGucuo = null;
            handleDeath(DEATH_MESSAGES.abandon_suicide, "suicide");
          }
        }

        function showRelic(relicKey, callback) {
          const relicImages = {
            shangxiahang: "/static/上下杭魂器.png",
            zhuzifang: "/static/朱紫坊魂器.png",
            sanfangqixiang: "/static/三坊七巷魂器.png",
          };

          relicIcon.style.backgroundImage = `url('${relicImages[relicKey]}')`;
          relicName.textContent = RELIC_NAMES[relicKey] || "";
          relicDisplay.classList.add("relic-display--open");

          pauseGameTimer();

          function handler() {
            relicDisplay.classList.remove("relic-display--open");
            document.removeEventListener("click", handler);
            resumeGameTimer();
            setTimeout(callback, 100);
          }

          setTimeout(() => document.addEventListener("click", handler), 300);
        }

        function showRelicMerge(callback) {
          lockMovement();
          pauseGameTimer();

          relicMergeRow.innerHTML = `
                <div class="relic-merge__item" style="background-image: url('/static/上下杭魂器.png')"></div>
                <div class="relic-merge__item" style="background-image: url('/static/朱紫坊魂器.png')"></div>
                <div class="relic-merge__item" style="background-image: url('/static/三坊七巷魂器.png')"></div>
            `;

          relicMergeOverlay.classList.add("relic-merge-overlay--open");

          setTimeout(() => {
            relicMergeRow.style.opacity = "0";
            relicMergeFinal.classList.add("relic-merge__final--visible");
          }, 3000);

          setTimeout(() => {
            relicMergeText.classList.add("relic-merge__text--visible");
          }, 4500);

          setTimeout(() => {
            relicMergeOverlay.classList.remove("relic-merge-overlay--open");
            relicMergeRow.style.opacity = "1";
            relicMergeFinal.classList.remove("relic-merge__final--visible");
            relicMergeText.classList.remove("relic-merge__text--visible");
            unlockMovement();
            resumeGameTimer();
            callback();
          }, 7000);
        }

        function checkGameComplete() {
          if (collectedRelics.length >= 3 && !gameComplete) {
            gameComplete = true;
            lockMovement();

            showDialogs(DIALOGS.ending_merge, () => {
              showRelicMerge(() => {
                playStory(ENDING_SLIDES, () => {
                  showEnding();
                });
              });
            });
          }
        }

        function showEnding() {
          const totalSeconds = stopGameTimer();
          refreshAmbientBgm();

          endingTime.textContent = formatTime(totalSeconds);

          advanceProgress("game_complete").then((response) => {
            if (response && response.best_record) {
              const best = response.best_record;
              if (typeof best.duration === "number") {
                if (best.duration >= totalSeconds) {
                  endingBest.textContent = "🎉 新纪录！";
                } else {
                  endingBest.textContent = `最佳纪录: ${formatTime(best.duration)}`;
                }
              } else {
                endingBest.textContent = "最佳纪录: --:--";
              }
            }
          });

          endingOverlay.classList.add("ending-overlay--open");
        }

        function handleDeath(message, deathType = "dead") {
          isDead = true;
          lockMovement();
          pauseGameTimer();
          refreshAmbientBgm();

          player.classList.remove(
            "player--walking",
            "player--fixing",
            "player--surprised",
          );

          if (deathType === "suicide") {
            player.classList.add("player--suicide");
          } else {
            player.classList.add("player--dead");
          }

          setTimeout(() => {
            if (deathType === "suicide") {
              deathIcon.classList.add("death-overlay__icon--suicide");
            } else {
              deathIcon.classList.remove("death-overlay__icon--suicide");
            }

            deathSubtext.textContent = message;
            deathOverlay.classList.add("death-overlay--open");

            setTimeout(() => {
              deathSubtext.textContent = "数据迷失，请重新校准修复路径。";
              const btn = deathOverlay.querySelector('[data-action="restart"]');
              if (btn) btn.classList.add("death-overlay__button--visible");
            }, 1500);
          }, 2000);
        }

        function restart() {
          window.location.href = "/start/";
        }

        function updateCamera() {
          const viewWidth = window.innerWidth;
          const halfView = viewWidth / 2;

          if (playerX < halfView) {
            cameraX = 0;
          } else if (playerX > WORLD_WIDTH - halfView) {
            cameraX = WORLD_WIDTH - viewWidth;
          } else {
            cameraX = playerX - halfView;
          }

          cameraX = Math.max(0, cameraX);

          const playerScreenX = playerX - cameraX;
          const playerWidthPx =
            parseFloat(getComputedStyle(player).width) || 150;
          player.style.setProperty(
            "--player-screen-x",
            `${playerScreenX - playerWidthPx / 2}px`,
          );

          gameWorld.style.transform = `translateX(${-cameraX}px)`;
          gameWorld.style.width = `${WORLD_WIDTH}px`;
        }

        function gameLoop() {
          if (
            movementLocked ||
            isDialogOpen ||
            isStoryPlaying ||
            isFighting ||
            isDead ||
            isRepairing
          ) {
            if (isWalking) {
              isWalking = false;
              player.classList.remove("player--walking");
            }
            return;
          }

          let moved = false;

          if (isMovingLeft && playerX > 50) {
            playerX -= CONFIG.player.speed;
            facingRight = false;
            moved = true;
          }

          if (isMovingRight && playerX < WORLD_WIDTH - 50) {
            playerX += CONFIG.player.speed;
            facingRight = true;
            moved = true;
          }

          if (moved) {
            player.classList.toggle("player--flip", !facingRight);
            if (!isWalking) {
              isWalking = true;
              player.classList.add("player--walking");
            }
            updateCamera();
            checkEntityProximity();
            checkAbandonRepair();
          } else {
            if (isWalking) {
              isWalking = false;
              player.classList.remove("player--walking");
            }
          }
        }

        function checkEntityProximity() {
          if (
            isDead ||
            isFighting ||
            isDialogOpen ||
            isStoryPlaying ||
            isRepairing ||
            movementLocked
          )
            return;

          for (const entity of ENTITIES) {
            if (entity.hidden) continue;

            const dist = Math.abs(playerX - entity.x);

            if (
              entity.type === "gucuo" &&
              entity.state === "barrier" &&
              dist < CONFIG.interactionRange
            ) {
              if (entity.bossId && !bossDefeated[entity.bossId]) {
                const storyKey = entity.id;
                if (!storyPlayed[storyKey]) {
                  storyPlayed[storyKey] = true;

                  let slides = [];
                  let dialogKey = "";
                  if (entity.id === "shangxiahang") {
                    slides = SHANGXIAHANG_SLIDES;
                    dialogKey = "chatgpt_encounter";
                  } else if (entity.id === "zhuzifang") {
                    slides = ZHUZIFANG_SLIDES;
                    dialogKey = "gemini_encounter";
                  } else if (entity.id === "sanfangqixiang") {
                    slides = SANFANGQIXIANG_SLIDES;
                    dialogKey = "claude_encounter";
                  }

                  lockMovement();
                  playStory(slides, () => {
                    showDialogs(DIALOGS[dialogKey] || [], () => {
                      startFight(entity.bossId);
                    });
                  });
                  return;
                }
              }
            }

            if (
              entity.type === "gucuo" &&
              entity.state === "repair" &&
              dist < CONFIG.interactionRange
            ) {
              if (!repairGuideShown[entity.id]) {
                repairGuideShown[entity.id] = true;
                lockMovement();
                showDialogs(DIALOGS.repair_guide);
              }
              return;
            }

            if (
              entity.type === "gucuo" &&
              entity.state === "repaired" &&
              dist < CONFIG.interactionRange
            ) {
              if (isEntityOnCooldown(entity.id)) continue;

              const recently = repairedRecently[entity.id] || 0;
              if (Date.now() - recently < 2500) continue;

              setEntityCooldown(entity.id);
              lockMovement();
              const repairedDialogKey = `${entity.id}_repaired`;
              showDialogs(
                DIALOGS[repairedDialogKey] || [
                  { text: `古村${entity.label}...幸好你已经修复了它。` },
                ],
              );
              return;
            }

            if (
              (entity.type === "npc" || entity.type === "landmark") &&
              dist < CONFIG.interactionRange
            ) {
              if (isEntityOnCooldown(entity.id)) continue;

              if (entity.dialogKey) {
                setEntityCooldown(entity.id);
                lockMovement();
                showDialogs(DIALOGS[entity.dialogKey] || []);
                return;
              }
            }
          }
        }

        function handleKeyDown(e) {
          // ChatGPT 第一关特殊处理
          if (isFighting && currentBoss === "chatgpt") {
            handleChatGPTKeyDown(e);
            return;
          }

          if (e.key === " " || e.key === "Enter") {
            if (isDialogOpen) {
              e.preventDefault();
              advanceDialog();
              return;
            }
          }

          if (e.key === "Escape" && isStoryPlaying) {
            skipStory();
            return;
          }

          if (
            movementLocked ||
            isDialogOpen ||
            isStoryPlaying ||
            isFighting ||
            isDead
          )
            return;

          if (e.key === "a" || e.key === "A" || e.key === "ArrowLeft")
            isMovingLeft = true;
          if (e.key === "d" || e.key === "D" || e.key === "ArrowRight")
            isMovingRight = true;
        }

        function handleKeyUp(e) {
          // ChatGPT 第一关特殊处理
          if (isFighting && currentBoss === "chatgpt") {
            handleChatGPTKeyUp(e);
          }

          if (e.key === "a" || e.key === "A" || e.key === "ArrowLeft")
            isMovingLeft = false;
          if (e.key === "d" || e.key === "D" || e.key === "ArrowRight")
            isMovingRight = false;
        }

        function handleClick(e) {
          const target = e.target;
          const actionEl = target.closest("[data-action]");
          const action = actionEl?.getAttribute("data-action");

          switch (action) {
            case "toggle-sound":
              toggleSound();
              return;
            case "enable-sound":
              toggleSound();
              return;
            case "skip-story":
              skipStory();
              return;
            case "restart":
              restart();
              return;
            case "move-left":
              return;
            case "move-right":
              return;
          }

          if (isDialogOpen && target.closest('[data-role="dialog-box"]')) {
            advanceDialog();
            return;
          }

          const entityEl = target.closest(".entity");
          if (entityEl) {
            const entityId = entityEl.dataset.id || "";
            const entity = getEntityById(entityId);
            const dist = entity ? Math.abs(playerX - entity.x) : Infinity;

            if (
              entity &&
              entity.type === "gucuo" &&
              entity.state === "repair" &&
              dist < CONFIG.interactionRange
            ) {
              if (!isRepairing) {
                startRepair(entity);
              } else if (
                currentRepairEntity &&
                currentRepairEntity.id === entityId
              ) {
                handleRepairClick(entityId);
              }
              return;
            }

            if (
              isRepairing &&
              currentRepairEntity &&
              currentRepairEntity.id === entityId
            ) {
              handleRepairClick(entityId);
              return;
            }
          }

          if (isRepairing && currentRepairEntity) {
            handleRepairClick(currentRepairEntity.id);
            return;
          }

          if (!bgmStarted) {
            bgmStarted = true;
            bgmAudio.play().catch(() => {});
            updateSoundButton();
            hideSoundReminder();
          }
        }

        function handleMobileControl(action, isPressed) {
          if (
            movementLocked ||
            isDialogOpen ||
            isStoryPlaying ||
            isFighting ||
            isDead
          )
            return;

          if (action === "move-left") isMovingLeft = isPressed;
          if (action === "move-right") isMovingRight = isPressed;
        }

        function applyPlayerVisualAdjust() {
          player.style.setProperty(
            "--player-ground-offset",
            `${CONFIG.player.groundOffset || 0}px`,
          );
          player.style.setProperty(
            "--player-ground-fill",
            `${CONFIG.player.groundFill || 0}px`,
          );
          player.style.setProperty(
            "--player-ground-color",
            `${CONFIG.player.groundColor || "#1f2630"}`,
          );
          player.style.setProperty("--player-y", `${CONFIG.player.y || 0}px`);
        }

        function startGameFlow() {
          updateCamera();
          updateBackground();
          refreshAmbientBgm();

          if (!storyPlayed.intro) {
            storyPlayed.intro = true;
            lockMovement();
            pauseGameTimer();

            playStory(INTRO_SLIDES, () => {
              showDialogs(DIALOGS.intro_start, () => {
                showDialogs(DIALOGS.intro_controls);
              });
            });
          } else {
            // 如果已经播放过intro，确保隐藏story overlay
            storyOverlay.classList.add("story-overlay--hidden");
            resumeGameTimer();
          }
        }
        function init() {
          // 先隐藏 story overlay，避免闪烁
          storyOverlay.classList.add("story-overlay--hidden");

          renderEntities();
          updateCamera();
          updateHUD();
          updateBackground();
          applyPlayerVisualAdjust();

          document.addEventListener("keydown", handleKeyDown);
          document.addEventListener("keyup", handleKeyUp);
          document.addEventListener("click", handleClick);
          window.addEventListener("resize", updateCamera);

          const mobileLeft = document.querySelector(
            '[data-action="move-left"]',
          );
          const mobileRight = document.querySelector(
            '[data-action="move-right"]',
          );

          if (mobileLeft) {
            mobileLeft.addEventListener(
              "touchstart",
              (e) => {
                e.preventDefault();
                handleMobileControl("move-left", true);
              },
              { passive: false },
            );
            mobileLeft.addEventListener("touchend", () =>
              handleMobileControl("move-left", false),
            );
            mobileLeft.addEventListener("touchcancel", () =>
              handleMobileControl("move-left", false),
            );
          }

          if (mobileRight) {
            mobileRight.addEventListener(
              "touchstart",
              (e) => {
                e.preventDefault();
                handleMobileControl("move-right", true);
              },
              { passive: false },
            );
            mobileRight.addEventListener("touchend", () =>
              handleMobileControl("move-right", false),
            );
            mobileRight.addEventListener("touchcancel", () =>
              handleMobileControl("move-right", false),
            );
          }

          storyOverlay.addEventListener("click", () => {
            if (isStoryPlaying) skipStory();
          });
          storyOverlay.addEventListener("touchend", () => {
            if (isStoryPlaying) skipStory();
          });

          setInterval(gameLoop, 16);

          startGameFlow();
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", init);
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
