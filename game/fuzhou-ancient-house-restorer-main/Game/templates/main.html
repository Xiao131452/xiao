              ? e.touches[0].clientX
              : e.clientX;
            const clientY = e.type.includes("touch")
              ? e.touches[0].clientY
              : e.clientY;

            const config = CLAUDE_PIECE_CONFIG[claudeDraggingPiece.pieceId];
            claudeDragGhost.style.left = `${clientX - (config.width * claudeBoardScale) / 2}px`;
            claudeDragGhost.style.top = `${clientY - (config.height * claudeBoardScale) / 2}px`;

            // 检查是否悬停在放置区域上
            const dropZones = board.querySelectorAll(
              ".claude-puzzle__drop-zone--available",
            );
            dropZones.forEach((zone) => {
              const rect = zone.getBoundingClientRect();
              const isOver =
                clientX >= rect.left &&
                clientX <= rect.right &&
                clientY >= rect.top &&
                clientY <= rect.bottom;

              zone.classList.toggle("claude-puzzle__drop-zone--hover", isOver);
            });
          }

          function handleDragEnd(e) {
            if (!claudeDraggingPiece) return;

            const clientX = e.type.includes("touch")
              ? e.changedTouches
                ? e.changedTouches[0].clientX
                : 0
              : e.clientX;
            const clientY = e.type.includes("touch")
              ? e.changedTouches
                ? e.changedTouches[0].clientY
                : 0
              : e.clientY;

            // 查找放置目标
            const boardRect = board.getBoundingClientRect();
            let placed = false;

            // 检查是否在面板区域内
            if (
              clientX >= boardRect.left &&
              clientX <= boardRect.right &&
              clientY >= boardRect.top &&
              clientY <= boardRect.bottom
            ) {
              // 计算相对于面板的位置（原始坐标系）
              const relX = (clientX - boardRect.left) / claudeBoardScale;
              const relY = (clientY - boardRect.top) / claudeBoardScale;

              // 查找最近的合适放置区域
              const currentLayerPieces =
                CLAUDE_LAYERS[claudeCurrentLayer]?.pieces || [];
              let wrongPlacement = false;
              const draggingPieceId = claudeDraggingPiece.pieceId;

              // 检查是否尝试放置在错误的位置
              for (const [id, config] of Object.entries(CLAUDE_PIECE_CONFIG)) {
                if (!CLAUDE_ALLOWED_PIECES.has(id)) continue;
                if (claudePlacedPieces.has(id)) continue;

                const tolerance = CLAUDE_PLACEMENT_TOLERANCE;
                const inZone =
                  relX >= config.x - tolerance &&
                  relX <= config.x + config.width + tolerance &&
                  relY >= config.y - tolerance &&
                  relY <= config.y + config.height + tolerance;

                if (inZone) {
                  if (
                    id === draggingPieceId &&
                    currentLayerPieces.includes(id)
                  ) {
                    // 正确放置
                    placePieceFromConveyor(
                      container,
                      draggingPieceId,
                      claudeDraggingPiece.conveyorId,
                    );
                    placed = true;
                  } else if (currentLayerPieces.includes(id)) {
                    // 落在本层的合法放置区域，但放错位置/零件
                    wrongPlacement = true;
                  }
                  break;
                }
              }

              if (wrongPlacement) {
                cleanupDrag();
                endClaudeFight(false, "placement");
                return;
              }
            }

            // 清理拖拽状态
            cleanupDrag();
          }

          function cleanupDrag() {
            if (claudeDragGhost) {
              claudeDragGhost.remove();
              claudeDragGhost = null;
            }

            if (claudeDraggingPiece && claudeDraggingPiece.element) {
              claudeDraggingPiece.element.classList.remove(
                "claude-puzzle__piece--dragging",
              );
            }

            const hoverZones = board.querySelectorAll(
              ".claude-puzzle__drop-zone--hover",
            );
            hoverZones.forEach((zone) =>
              zone.classList.remove("claude-puzzle__drop-zone--hover"),
            );

            claudeDraggingPiece = null;
          }

          // 使用事件委托绑定到传送带容器
          belt.addEventListener("mousedown", handleDragStart);
          belt.addEventListener("touchstart", handleDragStart, {
            passive: false,
          });

          document.addEventListener("mousemove", handleDragMove);
          document.addEventListener("touchmove", handleDragMove, {
            passive: false,
          });

          document.addEventListener("mouseup", handleDragEnd);
          document.addEventListener("touchend", handleDragEnd);
          document.addEventListener("touchcancel", handleDragEnd);
        }

        function placePieceFromConveyor(container, pieceId, conveyorId) {
          const board = container.querySelector('[data-role="puzzle-board"]');
          const config = CLAUDE_PIECE_CONFIG[pieceId];

          // 添加到已放置集合
          claudePlacedPieces.add(pieceId);

          // 从传送带移除该组件
          const itemIndex = claudeConveyorItems.findIndex(
            (item) => item.element.dataset.conveyorId === conveyorId,
          );
          if (itemIndex !== -1) {
            claudeConveyorItems[itemIndex].element.remove();
            claudeConveyorItems.splice(itemIndex, 1);
          }

          // 在面板上显示放置的组件
          const placedPiece = document.createElement("div");
          placedPiece.className = "claude-puzzle__placed-piece";
          placedPiece.style.left = `${config.x * claudeBoardScale}px`;
          placedPiece.style.top = `${config.y * claudeBoardScale}px`;
          placedPiece.style.width = `${config.width * claudeBoardScale}px`;
          placedPiece.style.height = `${config.height * claudeBoardScale}px`;
          placedPiece.style.backgroundImage = `url('${config.image}')`;
          board.appendChild(placedPiece);

          // 检查当前层是否完成
          const currentLayerPieces =
            CLAUDE_LAYERS[claudeCurrentLayer]?.pieces || [];
          const allPlaced = currentLayerPieces.every((id) =>
            claudePlacedPieces.has(id),
          );

          if (allPlaced) {
            claudeCurrentLayer++;

            // 检查是否全部完成
            if (claudeCurrentLayer >= CLAUDE_LAYERS.length) {
              endClaudeFight(true);
              return;
            }
          }

          updateClaudePuzzleState(container);
        }

        function updateClaudeTimer(container) {
          const timerEl = container.querySelector('[data-role="puzzle-timer"]');
          const timeEl = container.querySelector('[data-role="puzzle-time"]');

          if (timeEl) {
            timeEl.textContent = claudeTimeLeft;
          }

          if (timerEl) {
            if (claudeTimeLeft <= 15) {
              timerEl.classList.add("claude-puzzle__timer--danger");
            } else {
              timerEl.classList.remove("claude-puzzle__timer--danger");
            }
          }
        }

        function startClaudePuzzle() {
          initClaudePuzzle();

          fightContent.innerHTML = "";
          const puzzleUI = createClaudePuzzleUI();
          fightContent.appendChild(puzzleUI);

          // 等待DOM更新后渲染
          requestAnimationFrame(() => {
            renderClaudePuzzle(puzzleUI);
            updateClaudeTimer(puzzleUI);
          });

          // 启动计时器
          claudeTimer = setInterval(() => {
            claudeTimeLeft--;
            const container = fightContent.querySelector(".claude-puzzle");
            if (container) {
              updateClaudeTimer(container);
            }

            if (claudeTimeLeft <= 0) {
              endClaudeFight(false, "timeout");
            }
          }, 1000);
        }
        function endClaudeFight(victory, reason = "") {
          // 清理计时器
          if (claudeTimer) {
            clearInterval(claudeTimer);
            claudeTimer = null;
          }

          // 停止传送带动画
          stopConveyorAnimation();

          // 清理拖拽状态
          if (claudeDragGhost) {
            claudeDragGhost.remove();
            claudeDragGhost = null;
          }
          claudeDraggingPiece = null;
          claudeConveyorItems = [];

          if (victory) {
            // 显示完成效果
            const container = fightContent.querySelector(".claude-puzzle");
            if (container) {
              const board = container.querySelector(
                '[data-role="puzzle-board"]',
              );
              if (board) {
                board.classList.add("claude-puzzle__board--complete");
                // 清除所有放置的组件（因为要显示完整图片）
                const placedPieces = board.querySelectorAll(
                  ".claude-puzzle__placed-piece",
                );
                placedPieces.forEach((p) => p.remove());
                const dropZones = board.querySelectorAll(
                  ".claude-puzzle__drop-zone",
                );
                dropZones.forEach((z) => (z.style.display = "none"));
              }
            }

            setTimeout(() => {
              fightOverlay.classList.remove("fight-overlay--open");
              fightContent.innerHTML = "";
              isFighting = false;
              fightResolved = true;

              bossDefeated.claude = true;
              advanceProgress("boss_defeat", { boss: "claude" });
              updateBackground();
              unlockMovement();
              refreshAmbientBgm();

              showDialogs(
                [{ text: "数字榫卯修复完成！棠樾牌坊的结构被重新校准。" }],
                () => {
                  updateEntityState("sanfangqixiang", "repair");
                  pendingRepairGucuo = "sanfangqixiang";
                },
              );
            }, 1500);
          } else {
            fightOverlay.classList.remove("fight-overlay--open");
            fightContent.innerHTML = "";
            isFighting = false;
            fightResolved = true;

            playClaudeDeathAnimation(reason);
          }
        }

        function playClaudeDeathAnimation(reason) {
          claudeDeathScene.classList.add("claude-death-scene--active");
          claudeDeathPlayer.classList.remove(
            "claude-death-scene__player--suicide",
          );
          claudeDeathPlayer.classList.add(
            "claude-death-scene__player--standing",
          );
          claudeDeathText.classList.remove("claude-death-scene__text--visible");

          const texts =
            reason === "timeout"
              ? [
                  "时间到了...",
                  "这次速度稍慢了一点...",
                  "先别着急，我们再试一次...",
                  "已经很接近完成目标了...",
                  "调整节奏后一定可以通过。",
                ]
              : [
                  "放置错误...",
                  "这个位置还可以再优化...",
                  "你已经在正确方向上了...",
                  "再尝试一次会更顺手...",
                  "稳住节奏，下一次就能完成。",
                ];

          let textIndex = 0;
          claudeDeathText.textContent = texts[0];

          setTimeout(() => {
            claudeDeathText.classList.add("claude-death-scene__text--visible");
          }, 500);

          const textInterval = setInterval(() => {
            textIndex++;
            if (textIndex < texts.length) {
              claudeDeathText.textContent = texts[textIndex];
            } else {
              clearInterval(textInterval);
            }
          }, 1500);

          setTimeout(
            () => {
              claudeDeathPlayer.classList.remove(
                "claude-death-scene__player--standing",
              );
              claudeDeathPlayer.classList.add(
                "claude-death-scene__player--suicide",
              );
            },
            texts.length * 1500 + 500,
          );

          setTimeout(
            () => {
              clearInterval(textInterval);
              claudeDeathScene.classList.remove("claude-death-scene--active");
              handleDeath(
                "这次修复尝试暂未成功，你先短暂撤离重整状态，准备下一轮挑战。",
                "suicide",
              );
            },
            texts.length * 1500 + 2000,
          );
        }
        function getCSRFToken() {
          const cookie = document.cookie
            .split("; ")
            .find((row) => row.startsWith("csrftoken="));
          return cookie ? cookie.split("=")[1] : "";
        }

        async function advanceProgress(action, data = {}) {
          try {
            const response = await fetch(API_ADVANCE, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken(),
              },
              body: JSON.stringify({ action, ...data }),
            });
            if (response.ok) return response.json();
          } catch (e) {
            console.error("进度更新失败:", e);
          }
          return null;
        }

        function formatTime(seconds) {
          const mins = Math.floor(seconds / 60);
          const secs = seconds % 60;
          return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
        }

        function lockMovement() {
          movementLocked = true;
          isMovingLeft = false;
          isMovingRight = false;
          if (isWalking) {
            isWalking = false;
            player.classList.remove("player--walking");
          }
        }

        function unlockMovement() {
          movementLocked = false;
        }

        function pauseGameTimer() {
          if (!timerRunning) return;
          accumulatedTime += Date.now() - gameStartTime;
          timerRunning = false;
          if (gameTimerInterval) {
            clearInterval(gameTimerInterval);
            gameTimerInterval = null;
          }
        }

        function resumeGameTimer() {
          if (timerRunning) return;
          gameStartTime = Date.now();
          timerRunning = true;
          gameTimerInterval = setInterval(() => {
            const elapsed = Math.floor(
              (accumulatedTime + (Date.now() - gameStartTime)) / 1000,
            );
            gameTimerDisplay.textContent = formatTime(elapsed);
          }, 1000);
        }

        function stopGameTimer() {
          if (timerRunning) {
            accumulatedTime += Date.now() - gameStartTime;
            timerRunning = false;
          }
          if (gameTimerInterval) {
            clearInterval(gameTimerInterval);
            gameTimerInterval = null;
          }
          return Math.floor(accumulatedTime / 1000);
        }

        function playBgm(key) {
          const src = BGM_MAP[key];
          if (!src || currentBgmKey === key) return;
          currentBgmKey = key;
          bgmAudio.src = src;
          bgmAudio.volume = 0.5;
          if (bgmStarted) bgmAudio.play().catch(() => {});
          updateSoundButton();
        }

        function playDialogSfx() {
          if (bgmStarted && sfxDialog) {
            sfxDialog.currentTime = 0;
            sfxDialog.volume = 0.4;
            sfxDialog.play().catch(() => {});
          }
        }

        function toggleSound() {
          if (!bgmStarted || bgmAudio.paused) {
            bgmStarted = true;
            bgmAudio
              .play()
              .then(() => {
                updateSoundButton();
                hideSoundReminder();
              })
              .catch(() => {});
          } else {
            bgmAudio.pause();
            updateSoundButton();
          }
        }

        function updateSoundButton() {
          const isPlaying = bgmStarted && !bgmAudio.paused;
          soundIcon.src = isPlaying
            ? "/static/声音开启图标.png"
            : "/static/声音关闭图标.png";
        }

        function hideSoundReminder() {
          soundReminder.classList.add("sound-reminder--hidden");
        }

        function refreshAmbientBgm() {
          if (isDead) {
            playBgm("death");
            return;
          }
          if (isFighting) {
            playBgm("fight");
            return;
          }
          if (isRepairing) {
            playBgm("repair");
            return;
          }
          playBgm(collectedRelics.length);
        }

        function getBossDefeatedCount() {
          return Object.values(bossDefeated).filter(Boolean).length;
        }

        function updateBackground() {
          const stage = Math.min(getBossDefeatedCount(), 3);
          const bgSrc = BACKGROUND_MAP[stage];
          if (bgSrc) backgroundLayer.style.backgroundImage = `url('${bgSrc}')`;
        }

        function updateHUD() {
          collectedRelics.forEach((relic) => {
            const el = document.querySelector(`[data-relic="${relic}"]`);
            if (el) el.classList.add("hud__relic--collected");
          });
        }

        function renderEntities() {
          gameWorld.querySelectorAll(".entity").forEach((el) => el.remove());

          ENTITIES.forEach((entity) => {
            if (entity.hidden) return;

            const el = document.createElement("div");
            el.className = `entity entity--${entity.type}`;
            el.dataset.id = entity.id;
            el.style.left = `${entity.x}px`;
            el.style.setProperty(
              "--entity-ground-offset",
              `${entity.groundOffset || 0}px`,
            );
            el.style.setProperty("--entity-y", `${entity.y || 0}px`);

            if (entity.state) el.dataset.state = entity.state;

            const sprite = document.createElement("div");
            sprite.className = "entity__sprite";

            if (entity.scale) {
              const baseSize = entity.type === "gucuo" ? 2048 : 2000;
              const width = baseSize * entity.scale;
              const ratio = entity.ratio || 1;
              const height = width * ratio;
              sprite.style.width = `${width}px`;
              sprite.style.height = `${height}px`;
            }

            const label = document.createElement("div");
            label.className = "entity__label";
            label.textContent = entity.label;
            if (entity.labelY) {
              label.style.marginBottom = `${-54 + entity.labelY}px`;
            }

            el.appendChild(sprite);
            el.appendChild(label);

            if (
              entity.type === "gucuo" &&
              entity.state === "barrier" &&
              entity.bossId
            ) {
              const aiLogo = document.createElement("div");
              aiLogo.className = "entity__ai-logo";
              const logoMap = {
                chatgpt: "ChatGPT",
                gemini: "Gemini",
                claude: "Claude",
              };
              aiLogo.style.backgroundImage = `url('/static/${logoMap[entity.bossId]}.png')`;
              el.appendChild(aiLogo);
            }

            if (entity.type === "gucuo" && entity.state === "repair") {
              const hint = document.createElement("div");
              hint.className = "entity__hint";
              hint.textContent = "点击修复";
              el.appendChild(hint);
            }

            if (entity.type === "gucuo") {
              const repairBar = document.createElement("div");
              repairBar.className = "repair-bar";
              repairBar.innerHTML = `
                        <div class="repair-bar__timer" data-role="repair-timer"></div>
                        <div class="repair-bar__fill" data-role="repair-fill"></div>
                        <div class="repair-bar__clicks" data-role="repair-clicks"></div>
                    `;
              el.appendChild(repairBar);
            }

            gameWorld.appendChild(el);
          });
        }

        function updateEntityState(entityId, newState) {
          const entity = ENTITIES.find((e) => e.id === entityId);
          if (entity) {
            entity.state = newState;
            renderEntities();
          }
        }

        function getEntityById(id) {
          return ENTITIES.find((e) => e.id === id);
        }

        function isEntityOnCooldown(entityId) {
          const cooldownEnd = entityCooldowns[entityId] || 0;
          return Date.now() < cooldownEnd;
        }

        function setEntityCooldown(entityId) {
          entityCooldowns[entityId] = Date.now() + CONFIG.dialogCooldown;
        }

        function showDialogs(dialogs, callback = null) {
          if (!dialogs || dialogs.length === 0) {
            if (callback) callback();
            return;
          }

          lockMovement();
          pauseGameTimer();

          currentDialogs = dialogs;
          currentDialogIndex = 0;
          dialogCallback = callback;
          isDialogOpen = true;
          showCurrentDialog();
        }

        function showCurrentDialog() {
          const dialog = currentDialogs[currentDialogIndex];
          playDialogSfx();

          if (dialog.speaker) {
            dialogSpeaker.textContent = dialog.speaker;
            dialogSpeaker.style.display = "block";
          } else {
            dialogSpeaker.style.display = "none";
          }

          dialogText.textContent = dialog.text;
          dialogBox.classList.add("dialog-box--open");
        }

        function advanceDialog() {
          currentDialogIndex++;
          if (currentDialogIndex >= currentDialogs.length) {
            closeDialog();
          } else {
            showCurrentDialog();
          }
        }

        function closeDialog() {
          dialogBox.classList.remove("dialog-box--open");
          isDialogOpen = false;
          unlockMovement();
          resumeGameTimer();
          if (dialogCallback) {
            const cb = dialogCallback;
            dialogCallback = null;
            setTimeout(cb, 100);
          }
        }

        function playStory(slides, callback = null) {
          if (!slides || slides.length === 0) {
            if (callback) callback();
            return;
          }

          lockMovement();
          pauseGameTimer();

          currentStorySlides = slides;
          currentStoryIndex = 0;
          storyCallback = callback;
          isStoryPlaying = true;

          // 先设置内容，再显示
          showCurrentStorySlide();
          storyProgressBar.style.width = "0%";

          // 移除隐藏类来显示
          storyOverlay.classList.remove("story-overlay--hidden");

          startStoryTimer();
        }
        function showCurrentStorySlide() {
          const slide = currentStorySlides[currentStoryIndex];
          storyImage.src = slide.image;
          storyText.textContent = slide.text;
        }

        function startStoryTimer() {
          let startTime = Date.now();
          const duration = 4000;

          storyTimer = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const progress = Math.min((elapsed / duration) * 100, 100);
            storyProgressBar.style.width = `${progress}%`;

            if (elapsed >= duration) {
              currentStoryIndex++;
              if (currentStoryIndex >= currentStorySlides.length) {
                endStory();
              } else {
                startTime = Date.now();
                storyProgressBar.style.width = "0%";
                showCurrentStorySlide();
              }
            }
          }, 50);
        }

        function endStory() {
          if (storyTimer) {
            clearInterval(storyTimer);
            storyTimer = null;
          }
          storyOverlay.classList.add("story-overlay--hidden");
          isStoryPlaying = false;
          unlockMovement();
          resumeGameTimer();
          if (storyCallback) {
            const cb = storyCallback;
            storyCallback = null;
            setTimeout(cb, 100);
          }
        }

        function skipStory() {
          if (isStoryPlaying) endStory();
        }

        function shuffleArray(array) {
          const arr = [...array];
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
          return arr;
        }

        function selectGeminiQuestions() {
          const shuffled = shuffleArray(GEMINI_QUIZ_BANK);
          return shuffled.slice(0, 3);
        }

        function renderGeminiQuestion(container) {
          const question = geminiQuizQuestions[geminiQuizIndex];

        function handleAnswerSelect(index, container) {
          if (geminiQuizAnswered) return;

          const optionsEl = container.querySelector(
            '[data-role="quiz-options"]',
          );
          const options = optionsEl.querySelectorAll(".gemini-quiz__option");

          // 移除之前的选择
          options.forEach((opt) =>
            opt.classList.remove("gemini-quiz__option--selected"),
          );

          // 添加新选择
          options[index].classList.add("gemini-quiz__option--selected");

          updateSubmitButton(container);

        function updateSubmitButton(container) {
          const submitBtn = container.querySelector(
            '[data-role="quiz-submit"]',

          if (geminiSelectedAnswer !== null) {
            submitBtn.disabled = false;
            submitBtn.classList.add("gemini-quiz__submit--ready");
            submitBtn.textContent = "确认提交";
          } else {
            submitBtn.disabled = true;
            submitBtn.classList.remove("gemini-quiz__submit--ready");
            submitBtn.textContent = "提交答案";
          }

        function updateGeminiTimer(container) {
          const timerEl = container.querySelector('[data-role="quiz-timer"]');
          const timeEl = container.querySelector('[data-role="quiz-time"]');
          timeEl.textContent = geminiQuizTimeLeft;

          if (geminiQuizTimeLeft <= 10) {
            timerEl.classList.add("gemini-quiz__timer--danger");

            timerEl.classList.remove("gemini-quiz__timer--danger");
          }

        function handleGeminiSubmit(container) {
          if (geminiQuizAnswered) return;
          if (geminiSelectedAnswer === null) return;

          geminiQuizAnswered = true;

          const question = geminiQuizQuestions[geminiQuizIndex];
          const optionsEl = container.querySelector(
            '[data-role="quiz-options"]',
          );
          const submitBtn = container.querySelector(
            '[data-role="quiz-submit"]',
          );

          const options = optionsEl.querySelectorAll(".gemini-quiz__option");

          options.forEach((opt) =>
            opt.classList.add("gemini-quiz__option--disabled"),
          );
          submitBtn.disabled = true;
          submitBtn.classList.remove("gemini-quiz__submit--ready");

          const isAnswerCorrect = geminiSelectedAnswer === question.answer;

          if (isAnswerCorrect) {
            options[geminiSelectedAnswer].classList.add(
              "gemini-quiz__option--correct",
            );
          } else {
            options[geminiSelectedAnswer].classList.add(
              "gemini-quiz__option--wrong",

            options[question.answer].classList.add(

          if (isAnswerCorrect) {

            renderGeminiQuizDots(container);
            submitBtn.textContent = "✓ 正确！";

        // ========== ChatGPT 第一关：迷雾探索 ==========

        function generateChatGPTMaze() {
          const viewWidth = window.innerWidth;
          const viewHeight = window.innerHeight;

          // 计算可用区域（留出顶部UI和底部控制区）
          const headerHeight = 60;
          const controlsHeight = 180;
          const availableHeight = viewHeight - headerHeight - controlsHeight;
          const availableWidth = viewWidth - 40;

          // 根据可用空间计算格子数量
          chatgptMazeCols = Math.floor(availableWidth / CHATGPT_CELL_SIZE);
          chatgptMazeRows = Math.floor(availableHeight / CHATGPT_CELL_SIZE);

          // 限制范围，确保迷宫不会太大或太小
          chatgptMazeCols = Math.max(12, Math.min(chatgptMazeCols, 28));
          chatgptMazeRows = Math.max(10, Math.min(chatgptMazeRows, 18));

          // 确保是奇数，便于迷宫生成
          if (chatgptMazeCols % 2 === 0) chatgptMazeCols--;
          if (chatgptMazeRows % 2 === 0) chatgptMazeRows--;

          // 初始化地图：全部墙壁
          chatgptMazeMap = [];
          for (let r = 0; r < chatgptMazeRows; r++) {
            chatgptMazeMap[r] = [];
            for (let c = 0; c < chatgptMazeCols; c++) {
              chatgptMazeMap[r][c] = {
                type: "roof",
                damage: 0,
                recorded: false,
              };
            }
          }

          // 使用改进的迷宫生成算法
          generateMazeWithRooms();

          // 选择出生点（中心区域的通行格）
          selectSpawnPoint();

          // 放置损坏点（均匀分布）
          placeDamagePointsEvenly();

          // 重置状态
          chatgptRecordedCount = 0;
          chatgptRecordedSet.clear();
          chatgptTimeLeft = CHATGPT_TIME_LIMIT;
          chatgptPlayerDirection = "down";
          chatgptPlayerMoving = false;
          chatgptIsRecording = false;
          chatgptKeysPressed.clear();
        }

        function generateMazeWithRooms() {
          // 第一步：DFS 生成基础迷宫骨架
          const dirs = [
            [-2, 0],
            [2, 0],
            [0, -2],
            [0, 2],
          ];

          // 从中心开始
          let startR = Math.floor(chatgptMazeRows / 2);
          let startC = Math.floor(chatgptMazeCols / 2);
          if (startR % 2 === 0) startR++;
          if (startC % 2 === 0) startC++;

          const stack = [[startR, startC]];
          chatgptMazeMap[startR][startC].type = "normal";

          while (stack.length) {
            const [r, c] = stack[stack.length - 1];
            const shuffledDirs = shuffleArray([...dirs]);
            let found = false;

            for (const [dr, dc] of shuffledDirs) {
              const nr = r + dr;
              const nc = c + dc;
              const wr = r + dr / 2;
              const wc = c + dc / 2;

              if (
                nr > 0 &&
                nr < chatgptMazeRows - 1 &&
                nc > 0 &&
                nc < chatgptMazeCols - 1 &&
                chatgptMazeMap[nr][nc].type === "roof"
              ) {
                chatgptMazeMap[wr][wc].type = "normal";
                chatgptMazeMap[nr][nc].type = "normal";
                stack.push([nr, nc]);
                found = true;
                break;
              }
            }

            if (!found) {
              stack.pop();
            }
          }

          // 第二步：创建一些小房间（2x2或3x3的开放区域）
          const roomCount = Math.floor(
            (chatgptMazeRows * chatgptMazeCols) / 80,
          );
          for (let i = 0; i < roomCount; i++) {
            const roomR = Math.floor(Math.random() * (chatgptMazeRows - 4)) + 2;
            const roomC = Math.floor(Math.random() * (chatgptMazeCols - 4)) + 2;
            const roomSize = Math.random() < 0.7 ? 2 : 3;

            // 确保房间与现有通道相连
            let connected = false;
            for (let dr = -1; dr <= roomSize && !connected; dr++) {
              for (let dc = -1; dc <= roomSize && !connected; dc++) {
                const checkR = roomR + dr;
                const checkC = roomC + dc;
                if (
                  checkR >= 0 &&
                  checkR < chatgptMazeRows &&
                  checkC >= 0 &&
                  checkC < chatgptMazeCols &&
                  chatgptMazeMap[checkR][checkC].type === "normal"
                ) {
                  connected = true;
                }
              }
            }

            if (connected) {
              for (let dr = 0; dr < roomSize; dr++) {
                for (let dc = 0; dc < roomSize; dc++) {
                  const rr = roomR + dr;
                  const rc = roomC + dc;
                  if (
                    rr > 0 &&
                    rr < chatgptMazeRows - 1 &&
                    rc > 0 &&
                    rc < chatgptMazeCols - 1
                  ) {
                    chatgptMazeMap[rr][rc].type = "normal";
                  }
                }
              }
            }
          }

          // 第三步：添加额外通道，增加路径多样性
          const extraPassages = Math.floor(
            chatgptMazeRows * chatgptMazeCols * 0.03,
          );
          for (let i = 0; i < extraPassages; i++) {
            const r = Math.floor(Math.random() * (chatgptMazeRows - 2)) + 1;
            const c = Math.floor(Math.random() * (chatgptMazeCols - 2)) + 1;

            if (chatgptMazeMap[r][c].type === "roof") {
              // 检查是否有相邻的通行格
              let adjNormal = 0;
              for (const [dr, dc] of [
                [-1, 0],
                [1, 0],
                [0, -1],
                [0, 1],
              ]) {
                const nr = r + dr;
                const nc = c + dc;
                if (
                  nr >= 0 &&
                  nr < chatgptMazeRows &&
                  nc >= 0 &&
                  nc < chatgptMazeCols &&
                  chatgptMazeMap[nr][nc].type === "normal"
                ) {
                  adjNormal++;
                }
              }
              // 至少有2个相邻通行格才开通，避免形成大空地
              if (adjNormal >= 2 && adjNormal <= 3) {
                chatgptMazeMap[r][c].type = "normal";
              }
            }
          }
        }

        function selectSpawnPoint() {
          // 收集所有通行格
          const passableCells = [];
          for (let r = 0; r < chatgptMazeRows; r++) {
            for (let c = 0; c < chatgptMazeCols; c++) {
              if (chatgptMazeMap[r][c].type === "normal") {
                passableCells.push([r, c]);
              }
            }
          }

          // 优先选择中心区域
          const centerR = chatgptMazeRows / 2;
          const centerC = chatgptMazeCols / 2;

          passableCells.sort((a, b) => {
            const distA = Math.abs(a[0] - centerR) + Math.abs(a[1] - centerC);
            const distB = Math.abs(b[0] - centerR) + Math.abs(b[1] - centerC);
            return distA - distB;
          });

          // 从最靠近中心的格子中随机选择
          const candidateCount = Math.min(5, passableCells.length);
          const idx = Math.floor(Math.random() * candidateCount);
          [chatgptPlayerRow, chatgptPlayerCol] = passableCells[idx];
        }

        function placeDamagePointsEvenly() {
          // 收集所有通行格（排除出生点）
          const passableCells = [];
          for (let r = 0; r < chatgptMazeRows; r++) {
            for (let c = 0; c < chatgptMazeCols; c++) {
              if (
                chatgptMazeMap[r][c].type === "normal" &&
                !(r === chatgptPlayerRow && c === chatgptPlayerCol)
              ) {
                passableCells.push([r, c]);
              }
            }
          }

          if (passableCells.length < CHATGPT_TOTAL_DAMAGES) {
            console.warn("Not enough passable cells for damage points");
            return;
          }

          // 将地图分成若干区域，每个区域放置一定数量的损坏点
          const regions = divideIntoRegions(
            passableCells,
            CHATGPT_TOTAL_DAMAGES,
          );

          chatgptDamagePoints = [];

          for (const region of regions) {
            if (region.length === 0) continue;

            // 从每个区域随机选择一个格子
            const idx = Math.floor(Math.random() * region.length);
            const [r, c] = region[idx];

            const damageStyle = Math.floor(Math.random() * 10) + 1;
            chatgptMazeMap[r][c].damage = damageStyle;
            chatgptDamagePoints.push({ row: r, col: c, style: damageStyle });
          }
        }

        function divideIntoRegions(cells, regionCount) {
          if (cells.length === 0 || regionCount <= 0) return [];

          // 使用网格划分方式
          const gridSize = Math.ceil(Math.sqrt(regionCount));
          const cellWidth = chatgptMazeCols / gridSize;
          const cellHeight = chatgptMazeRows / gridSize;

          const regions = [];
          for (let i = 0; i < regionCount; i++) {
            regions.push([]);
          }

          for (const [r, c] of cells) {
            const gridR = Math.floor(r / cellHeight);
            const gridC = Math.floor(c / cellWidth);
            const regionIdx = Math.min(
              gridR * gridSize + gridC,
              regionCount - 1,
            );
            regions[regionIdx].push([r, c]);
          }

          // 合并空区域的配额到相邻区域
          const nonEmptyRegions = regions.filter((r) => r.length > 0);

          // 如果非空区域不够，从大区域中再选择
          while (nonEmptyRegions.length < regionCount) {
            // 找到最大的区域
            let maxIdx = 0;
            let maxLen = 0;
            for (let i = 0; i < nonEmptyRegions.length; i++) {
              if (nonEmptyRegions[i].length > maxLen) {
                maxLen = nonEmptyRegions[i].length;
                maxIdx = i;
              }
            }

            if (maxLen <= 1) break;

            // 分割最大区域
            const half = Math.floor(nonEmptyRegions[maxIdx].length / 2);
            const newRegion = nonEmptyRegions[maxIdx].splice(half);
            nonEmptyRegions.push(newRegion);
          }

          return nonEmptyRegions.slice(0, regionCount);
        }

          const cellData = chatgptMazeMap[chatgptPlayerRow][chatgptPlayerCol];

          if (damageDialog && damageTitleEl && damageTextEl) {
            if (isOnDamage && !isRecorded) {
              const desc = CHATGPT_DAMAGE_DESCRIPTIONS[cellData.damage];
              if (desc) {
                damageTitleEl.textContent = desc.title;
                damageTextEl.textContent = desc.text;

                // 使用损害点图片作为头像

                }

                damageDialog.classList.add(

                );
              }
            } else {
              damageDialog.classList.remove(
                "chatgpt-maze__damage-dialog--visible",
              );
            }
          }

          // 更新当前损坏格的高亮
          const cells = container.querySelectorAll(".chatgpt-maze__cell");
          cells.forEach((cell) => {
            cell.classList.remove("chatgpt-maze__cell--current-damage");
            if (
              canRecord &&
              parseInt(cell.dataset.row) === chatgptPlayerRow &&
              parseInt(cell.dataset.col) === chatgptPlayerCol
            ) {
