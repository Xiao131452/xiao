<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>重生之我是徽州古建筑修复师</title>
    <style>
      :root {
        --fog-paper: #eef2f6;
        --graphite-ink: #1e2329;
        --blueprint-blue: #6e7f90;
        --slate-shadow: #2b3440;
        --plaster-gray: #b8c0c8;
        --timber-brown: #7a5a3e;
        --ochre-leaf: #c6a15a;
        --lacquer-red: #3f444b;
        --patina-teal: #2f6f6a;
        --border-main: rgba(30, 35, 41, 0.55);
        --font-ui:
          system-ui, -apple-system, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        --font-mono:
          "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas,
          monospace;

        --ground-base: 1344px;
        --ground-scale: 0.375;
        --ground-height: calc(var(--ground-base) * var(--ground-scale));
        --ground-surface-offset: -500px;

        --player-base: 2000px;
        --player-scale: 0.15;
        --player-width: calc(var(--player-base) * var(--player-scale));
        --player-height: calc(var(--player-base) * var(--player-scale));

        --npc-base: 2000px;
        --npc-scale: 0.07;
        --npc-ratio: 1.3;
        --npc-width: calc(var(--npc-base) * var(--npc-scale));
        --npc-height: calc(
          var(--npc-base) * var(--npc-scale) * var(--npc-ratio)
        );

        --landmark-base: 2000px;
        --landmark-scale: 0.28;
        --landmark-ratio: 1.4;
        --landmark-width: calc(var(--landmark-base) * var(--landmark-scale));
        --landmark-height: calc(
          var(--landmark-base) * var(--landmark-scale) * var(--landmark-ratio)
        );

        --gucuo-base: 2048px;
        --gucuo-scale: 0.18;
        --gucuo-ratio: 1;
        --gucuo-width: calc(var(--gucuo-base) * var(--gucuo-scale));
        --gucuo-height: calc(
          var(--gucuo-base) * var(--gucuo-scale) * var(--gucuo-ratio)
        );

        --ai-logo-base: 2000px;
        --ai-logo-scale: 0.06;
        --ai-logo-size: calc(var(--ai-logo-base) * var(--ai-logo-scale));

        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-right: env(safe-area-inset-right, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-left: env(safe-area-inset-left, 0px);

        --font-pixel: "Press Start 2P", "Zpix", monospace;
        --clipboard-width: 420px;
        --clipboard-height: 580px;
        --clipboard-padding: 30px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: var(--font-ui);
        background: var(--graphite-ink);
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }

      .background-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .rotate-hint {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 24px;
        background: var(--graphite-ink);
        color: var(--fog-paper);
      }

      .rotate-hint__icon {
        width: 80px;
        height: 80px;
        border: 3px solid var(--fog-paper);
        border-radius: 8px;
        animation: rotate-phone 1.5s ease-in-out infinite;
      }

      @keyframes rotate-phone {
        0%,
        100% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(90deg);
        }
      }

      .rotate-hint__text {
        font-size: 18px;
      }

      @media (orientation: portrait) and (max-width: 900px) {
        .rotate-hint {
          display: flex;
        }
        .game-container {
          display: none !important;
        }
      }

      body.hzh-embed .rotate-hint {
        display: none !important;
      }
      body.hzh-embed .game-container {
        display: flex !important;
      }

      .sound-reminder {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 600;
        padding: 10px 16px;
        background: linear-gradient(135deg, var(--lacquer-red), #a02535);
        color: var(--fog-paper);
        text-align: center;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .sound-reminder--hidden {
        display: none;
      }

      .sound-reminder__button {
        padding: 4px 12px;
        font-size: 12px;
        color: var(--lacquer-red);
        background: var(--fog-paper);
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }

      .game-container {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 1;
      }

      .game-world {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        transition: transform 0.05s linear;
      }

      .game-world__ground {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: var(--ground-height);
        background-image: url("/static/地面背景.png");
        background-size: auto 100%;
        background-repeat: repeat-x;
        z-index: 10;
      }

      .player {
        position: fixed;
        width: var(--player-width);
        height: var(--player-height);
        bottom: calc(
          var(--ground-height) + var(--ground-surface-offset) +
            var(--player-ground-offset, 0px)
        );
        left: 0;
        transform: translateX(var(--player-screen-x, 0px))
          translateY(var(--player-y, 0px));
        z-index: 100;
      }

      .player__sprite {
        width: 100%;
        height: 100%;
        background-image: url("/static/人物-停止.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center bottom;
        transform-origin: center bottom;
      }

      .player__ground-fill {
        display: none;
      }

      .player--flip .player__sprite {
        transform: scaleX(-1);
      }
      .player--walking .player__sprite {
        animation: player-walk 0.4s steps(2) infinite;
      }

      @keyframes player-walk {
        0%,
        49% {
          background-image: url("/static/人物-走路-1.png");
        }
        50%,
        100% {
          background-image: url("/static/人物-走路-2.png");
        }
      }

      .player--dead .player__sprite {
        background-image: url("/static/人物-死亡.png");
        animation: none;
      }
      .player--surprised .player__sprite {
        background-image: url("/static/人物-惊讶.png");
        animation: none;
      }
      .player--suicide .player__sprite {
        background-image: url("/static/人物-自尽.png");
        animation: none;
      }

      .player--fixing .player__sprite {
        animation: player-fix-loop 0.6s steps(1) infinite;
      }

      @keyframes player-fix-loop {
        0%,
        49.9% {
          background-image: url("/static/修复-1.png");
        }
        50%,
        100% {
          background-image: url("/static/修复-2.png");
        }
      }

      .entity {
        position: absolute;
        bottom: calc(
          var(--ground-height) + var(--ground-surface-offset) +
            var(--entity-ground-offset, 0px)
        );
        z-index: 50;
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        transform: translateY(var(--entity-y, 0px));
      }

      .entity__sprite {
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center bottom;
        position: relative;
        z-index: 1;
      }

      .entity__ground-fill {
        display: none;
      }

      .entity__label {
        margin-bottom: -54px;
        font-size: 14px;
        color: var(--fog-paper);
        background: rgba(0, 0, 0, 0.7);
        padding: 4px 12px;
        white-space: nowrap;
        z-index: 2;
        order: 2;
      }

      .entity__hint {
        margin-bottom: 3px;
        font-size: 12px;
        color: var(--ochre-leaf);
        background: rgba(0, 0, 0, 0.7);
        padding: 2px 8px;
        white-space: nowrap;
        order: 3;
      }

      .entity--hidden {
        display: none;
      }

      .entity__ai-logo {
        position: absolute;
        top: calc(-1 * var(--ai-logo-size));
        left: 50%;
        transform: translateX(-50%);
        width: var(--ai-logo-size);
        height: var(--ai-logo-size);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        animation: ai-float 2s ease-in-out infinite;
      }

      @keyframes ai-float {
        0%,
        100% {
          transform: translateX(-50%) translateY(0);
        }
        50% {
          transform: translateX(-50%) translateY(-10px);
        }
      }

      .entity__sprite {
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center bottom;
        position: relative;
        z-index: 1;
        order: 1;
      }

      .entity--landmark[data-id="wuyi_plaza"] .entity__sprite {
        background-image: url("/static/路标-五一广场.png");
      }
      .entity--landmark[data-id="xiangyuebei"] .entity__sprite {
        background-image: url("/static/路标-乡约碑.png");
      }
      .entity--landmark[data-id="fzu_ruins"] .entity__sprite {
        background-image: url("/static/路标-福大至诚.png");
      }
      .entity--landmark[data-id="baita"] .entity__sprite {
        background-image: url("/static/路标-白塔.png");
      }
      .entity--landmark[data-id="zhenhailou"] .entity__sprite {
        background-image: url("/static/路标-镇海楼.png");
      }

      .entity--npc .entity__sprite {
        width: var(--npc-width);
        height: var(--npc-height);
      }

      .entity--landmark .entity__sprite {
        width: var(--landmark-width);
        height: var(--landmark-height);
      }

      .entity--npc[data-id="human_md"] .entity__sprite {
        background-image: url("/static/human.md.png");
      }

      .entity--gucuo .entity__sprite {
        width: var(--gucuo-width);
        height: var(--gucuo-height);
      }

      .entity--gucuo[data-id="shangxiahang"][data-state="barrier"]
        .entity__sprite {
        background-image: url("/static/上下杭-结界状态.png");
      }
      .entity--gucuo[data-id="shangxiahang"][data-state="repair"]
        .entity__sprite {
        background-image: url("/static/上下杭-待修复状态.png");
      }
      .entity--gucuo[data-id="shangxiahang"][data-state="repaired"]
        .entity__sprite {
        background-image: url("/static/上下杭-已修复状态.png");
      }

      .entity--gucuo[data-id="zhuzifang"][data-state="barrier"]
        .entity__sprite {
        background-image: url("/static/三坊七巷-结界状态.png");
      }
      .entity--gucuo[data-id="zhuzifang"][data-state="repair"] .entity__sprite {
        background-image: url("/static/三坊七巷-待修复状态.png");
      }
      .entity--gucuo[data-id="zhuzifang"][data-state="repaired"]
        .entity__sprite {
        background-image: url("/static/三坊七巷-已修复状态.png");
      }
      .entity--gucuo[data-id="zhuzifang"][data-state="collapse"]
        .entity__sprite {
        background-image: url("/static/三坊七巷-倒塌状态.png");
      }

      .entity--gucuo[data-id="zhuzifang"].entity--shaking .entity__sprite {
        animation: building-shake 0.1s ease-in-out infinite;
      }

      @keyframes building-shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      .entity--gucuo[data-id="sanfangqixiang"][data-state="barrier"]
        .entity__sprite {
        background-image: url("/static/朱紫坊-结界状态.png");
      }
      .entity--gucuo[data-id="sanfangqixiang"][data-state="repair"]
        .entity__sprite {
        background-image: url("/static/朱紫坊-待修复状态.png");
      }
      .entity--gucuo[data-id="sanfangqixiang"][data-state="repaired"]
        .entity__sprite {
        background-image: url("/static/朱紫坊-已修复状态.png");
      }
      .entity--gucuo[data-id="sanfangqixiang"][data-state="collapse"]
        .entity__sprite {
        background-image: url("/static/朱紫坊-倒塌状态.png");
      }

      .repair-bar {
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 16px;
        background: rgba(0, 0, 0, 0.8);
        border: 2px solid var(--border-main);
        display: none;
      }

      .repair-bar--active {
        display: block;
      }

      .repair-bar__fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--patina-teal),
          var(--ochre-leaf)
        );
        width: 0%;
        transition: width 0.1s ease-out;
      }

      .repair-bar__timer {
        position: absolute;
        bottom: -28px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 18px;
        font-family: var(--font-mono);
        color: var(--fog-paper);
        background: rgba(0, 0, 0, 0.8);
        padding: 2px 10px;
      }

      .repair-bar__timer--danger {
        color: var(--lacquer-red);
        animation: timer-pulse 0.5s ease-in-out infinite;
      }

      @keyframes timer-pulse {
        0%,
        100% {
          opacity: 1;
          transform: translateX(-50%) scale(1);
        }
        50% {
          opacity: 0.7;
          transform: translateX(-50%) scale(1.1);
        }
      }

      .repair-bar__clicks {
        position: absolute;
        top: -24px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        color: var(--plaster-gray);
      }

      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 400;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .hud__timer {
        font-size: 16px;
        font-family: var(--font-mono);
        color: var(--fog-paper);
        background: rgba(0, 0, 0, 0.6);
        padding: 8px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .hud__timer-icon {
        width: 20px;
        height: 20px;
        object-fit: contain;
      }

      .hud__relics {
        display: flex;
        gap: 8px;
      }

      .hud__relic {
        width: 50px;
        height: 50px;
        background: var(--slate-shadow);
        border: 2px solid var(--border-main);
        opacity: 0.3;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition:
          opacity 0.3s ease,
          border-color 0.3s ease;
      }

      .hud__relic--collected {
        opacity: 1;
        border-color: var(--ochre-leaf);
      }

      .hud__relic[data-relic="shangxiahang"] {
        background-image: url("/static/上下杭魂器.png");
      }
      .hud__relic[data-relic="zhuzifang"] {
        background-image: url("/static/朱紫坊魂器.png");
      }
      .hud__relic[data-relic="sanfangqixiang"] {
        background-image: url("/static/三坊七巷魂器.png");
      }

      .mobile-controls {
        position: fixed;
        bottom: 40px;
        left: 0;
        right: 0;
        z-index: 300;
        display: none;
        justify-content: space-between;
        padding: 0 30px;
        padding-bottom: var(--safe-area-bottom);
        pointer-events: none;
      }

      @media (pointer: coarse) {
        .mobile-controls {
          display: flex;
        }
      }

      .mobile-control-btn {
        width: 100px;
        height: 100px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        pointer-events: auto;
        opacity: 0.8;
        transition:
          opacity 0.1s ease,
          transform 0.1s ease;
      }

      .mobile-control-btn:active {
        opacity: 1;
        transform: scale(1.1);
      }
      .mobile-control-btn--left {
        background-image: url("/static/移动端向左移动按钮.png");
      }
      .mobile-control-btn--right {
        background-image: url("/static/移动端向右移动按钮.png");
      }

      .dialog-box {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 48px);
        max-width: 800px;
        background: rgba(43, 52, 64, 0.95);
        border: 2px solid var(--border-main);
        padding: 20px 24px;
        z-index: 500;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.2s ease-out,
          visibility 0.2s ease-out;
      }

      .dialog-box--open {
        opacity: 1;
        visibility: visible;
      }
      .dialog-box__speaker {
        font-size: 14px;
        font-weight: 600;
        color: var(--ochre-leaf);
        margin-bottom: 10px;
        font-family: var(--font-mono);
      }
      .dialog-box__text {
        font-size: 18px;
        line-height: 1.8;
        color: var(--fog-paper);
      }
      .dialog-box__indicator {
        position: absolute;
        bottom: 12px;
        right: 16px;
        font-size: 14px;
        color: var(--plaster-gray);
        animation: blink 1s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .story-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: var(--graphite-ink);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 0.5s ease-in-out,
          visibility 0.5s ease-in-out;
        pointer-events: auto;
        touch-action: manipulation;
      }

      .story-overlay--hidden {
        opacity: 0;
        visibility: hidden;
      }

      .story-overlay--open {
        opacity: 1;
        visibility: visible;
      }

      .story-image-container {
        position: relative;
        width: 100%;
        height: 75%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .story-image {
        width: 88vw;
        height: 70vh;
        max-width: 1100px;
        max-height: 70vh;
        object-fit: contain;
      }

      .story-text-container {
        width: 100%;
        max-width: 900px;
        padding: 24px 40px;
        text-align: center;
      }

      .story-text {
        font-size: 20px;
        line-height: 1.8;
        color: var(--fog-paper);
      }

      .story-progress {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        overflow: hidden;
      }

      .story-progress__bar {
        height: 100%;
        background: var(--patina-teal);
        transition: width 0.1s linear;
      }

      .story-skip {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 10px 20px;
        font-size: 14px;
        color: var(--fog-paper);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
      }

      .story-skip:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .relic-display {
        position: fixed;
        inset: 0;
        z-index: 900;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: rgba(30, 35, 41, 0.95);
      }

      .relic-display--open {
        display: flex;
      }

      .relic-display__icon {
        width: 180px;
        height: 180px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        animation: relic-glow 2s ease-in-out infinite;
      }

      @keyframes relic-glow {
        0%,
        100% {
          filter: brightness(1) drop-shadow(0 0 20px var(--ochre-leaf));
        }
        50% {
          filter: brightness(1.3) drop-shadow(0 0 40px var(--ochre-leaf));
        }
      }

      .relic-display__name {
        margin-top: 24px;
        font-size: 28px;
        font-weight: 600;
        color: var(--ochre-leaf);
      }
      .relic-display__hint {
        margin-top: 32px;
        font-size: 16px;
        color: var(--plaster-gray);
        animation: blink 1.5s ease-in-out infinite;
      }

      .relic-merge-overlay {
        position: fixed;
        inset: 0;
        z-index: 950;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.98);
      }

      .relic-merge-overlay--open {
        display: flex;
      }

      .relic-merge__row {
        display: flex;
        gap: 60px;
        margin-bottom: 60px;
        transition: opacity 1s ease-out;
      }

      .relic-merge__item {
        width: 100px;
        height: 100px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        animation: merge-pulse 1.5s ease-in-out infinite;
      }

      @keyframes merge-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.8;
        }
      }

      .relic-merge__final {
        width: 200px;
        height: 200px;
        background-image: url("/static/魂器-最终合并.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0;
        transform: scale(0.3);
        transition: all 1.5s ease-out;
      }

      .relic-merge__final--visible {
        opacity: 1;
        transform: scale(1);
        animation: final-glow 2s ease-in-out infinite;
      }

      @keyframes final-glow {
        0%,
        100% {
          filter: brightness(1) drop-shadow(0 0 30px var(--ochre-leaf))
            drop-shadow(0 0 60px var(--patina-teal));
        }
        50% {
          filter: brightness(1.4) drop-shadow(0 0 50px var(--ochre-leaf))
            drop-shadow(0 0 100px var(--patina-teal));
        }
      }

      .relic-merge__text {
        margin-top: 40px;
        font-size: 24px;
        color: var(--fog-paper);
        text-align: center;
        opacity: 0;
        transition: opacity 0.5s ease-out;
      }

      .relic-merge__text--visible {
        opacity: 1;
      }

      .death-overlay {
        position: fixed;
        inset: 0;
        z-index: 950;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      .death-overlay--open {
        display: flex;
      }

      .death-overlay__icon {
        width: 360px;
        height: 360px;
        background-image: url("/static/人物-死亡.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        margin-bottom: 24px;
      }

      .death-overlay__icon--suicide {
        background-image: url("/static/人物-自尽.png");
      }

      .death-overlay__text {
        font-size: 36px;
        font-weight: 600;
        color: var(--lacquer-red);
        margin-bottom: 16px;
      }
      .death-overlay__subtext {
        font-size: 18px;
        color: var(--plaster-gray);
        margin-bottom: 40px;
        min-height: 24px;
        text-align: center;
        max-width: 80%;
      }

      .death-overlay__button {
        padding: 14px 40px;
        font-size: 18px;
        color: var(--fog-paper);
        background: var(--slate-shadow);
        border: 2px solid var(--border-main);
        cursor: pointer;
        opacity: 0;
        transition:
          opacity 0.5s ease-out,
          transform 0.1s ease;
      }

      .death-overlay__button--visible {
        opacity: 1;
      }
      .death-overlay__button:hover {
        transform: scale(1.05);
      }

      .fight-overlay {
        position: fixed;
        inset: 0;
        z-index: 800;
        background: var(--graphite-ink);
        display: none;
      }

      .fight-overlay--open {
        display: block;
      }

      .fight-arena {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .fight-arena__background {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f0f23 100%
        );
      }
      .fight-arena__grid {
        position: absolute;
        inset: 0;
        opacity: 0.08;
        background-image:
          linear-gradient(var(--blueprint-blue) 1px, transparent 1px),
          linear-gradient(90deg, var(--blueprint-blue) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .fight-boss-name {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
        color: var(--lacquer-red);
        font-weight: 600;
      }

      .fight-content {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .fight-debug {
        display: flex;
        gap: 40px;
      }
      .fight-debug__btn {
        padding: 20px 50px;
        font-size: 24px;
        font-weight: 600;
        border: 3px solid;
        cursor: pointer;
        transition: transform 0.1s ease;
      }
      .fight-debug__btn:hover {
        transform: scale(1.05);
      }
      .fight-debug__btn--win {
        color: var(--patina-teal);
        background: rgba(47, 111, 106, 0.2);
        border-color: var(--patina-teal);
      }
      .fight-debug__btn--lose {
        color: var(--lacquer-red);
        background: rgba(140, 31, 45, 0.2);
        border-color: var(--lacquer-red);
      }

      /* ========== Gemini 问答战斗样式 (像素画板风格) ========== */
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&display=swap");

      .gemini-quiz {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: url("/static/第二关背景.png");
        background-size: cover;
        background-position: center;
        overflow: hidden;
      }

      /* 顶部状态栏 - 悬浮在画板上方 */
      .gemini-quiz__header {
        position: absolute;
        top: 12px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 20;
      }

      .gemini-quiz__boss {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid #333;
        box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.5);
      }

      .gemini-quiz__boss-icon {
        width: 28px;
        height: 28px;
        background-image: url("/static/Gemini.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        animation: gemini-pixel-pulse 1s steps(2) infinite;
        flex-shrink: 0;
      }

      @keyframes gemini-pixel-pulse {
        0%,
        100% {
          filter: drop-shadow(0 0 4px #4285f4);
          transform: translateY(0);
        }
        50% {
          filter: drop-shadow(0 0 8px #ea4335);
          transform: translateY(-2px);
        }
      }

      .gemini-quiz__boss-name {
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 14px;
        letter-spacing: 1px;
        background: linear-gradient(90deg, #4285f4, #ea4335, #fbbc04, #34a853);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        white-space: nowrap;
      }

      .gemini-quiz__stats {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .gemini-quiz__timer {
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: "Press Start 2P", monospace;
        font-size: 12px;
        color: var(--fog-paper);
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid #333;
        box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.5);
      }

      .gemini-quiz__timer-icon {
        width: 16px;
        height: 16px;
        object-fit: contain;
      }

      .gemini-quiz__timer--danger {
        color: #ff4444;
        animation: pixel-timer-flash 0.5s steps(2) infinite;
        border-color: #aa2222;
        background: rgba(40, 10, 10, 0.85);
      }

      @keyframes pixel-timer-flash {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }

      .gemini-quiz__progress {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 12px;
        color: var(--fog-paper);
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid #333;
        box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.5);
      }

      .gemini-quiz__progress-dots {
        display: flex;
        gap: 4px;
      }

      .gemini-quiz__dot {
        width: 10px;
        height: 10px;
        background: #444;
        border: 1px solid #222;
      }

      .gemini-quiz__dot--correct {
        background: #44cc44;
        border-color: #22aa22;
        box-shadow: 0 0 4px #44cc44;
      }

      .gemini-quiz__dot--current {
        border-color: #cccc44;
        animation: dot-pixel-pulse 0.8s steps(2) infinite;
      }

      @keyframes dot-pixel-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }

      /* 主画板容器 - 模拟木质画板 */
      .gemini-quiz__main {
        position: relative;
        width: min(380px, 85vw);
        height: min(560px, 85vh);
        background:
          linear-gradient(135deg, rgba(139, 115, 85, 0.15) 0%, transparent 50%),
          linear-gradient(to bottom, #f5f0e6 0%, #ebe5d8 100%);
        border: 8px solid #6b5335;
        border-radius: 4px;
        box-shadow:
          inset 0 0 20px rgba(107, 83, 53, 0.2),
          inset -4px -4px 0 #5a4328,
          inset 4px 4px 0 #8b7355,
          8px 8px 0 rgba(0, 0, 0, 0.4),
          12px 12px 20px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        padding: 16px;
        overflow: hidden;
        box-sizing: border-box;
      }

      /* 画板顶部夹子装饰 */
      .gemini-quiz__main::before {
        content: "";
        position: absolute;
        top: -4px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 24px;
        background: linear-gradient(180deg, #8b7355 0%, #6b5335 100%);
        border-radius: 0 0 8px 8px;
        box-shadow:
          inset -2px -2px 0 #5a4328,
          inset 2px 0 0 #a08060,
          0 4px 8px rgba(0, 0, 0, 0.3);
        z-index: 10;
      }

      /* 题目区域 */
      .gemini-quiz__question-box {
        flex-shrink: 0;
        background: rgba(255, 252, 245, 0.95);
        border: 2px solid #a08060;
        border-radius: 2px;
        padding: 12px 14px;
        margin-bottom: 12px;
        box-shadow:
          inset -2px -2px 0 #8b7355,
          inset 2px 2px 0 #d4c8b0;
      }

      .gemini-quiz__question-number {
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 13px;
        color: #6b5335;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }

      .gemini-quiz__question-text {
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 15px;
        line-height: 1.6;
        color: #2c2416;
        white-space: pre-wrap;
        word-break: break-word;
      }


      /* 选项区域 - 占据剩余空间 */
      .gemini-quiz__options {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding-right: 4px;
      }

      .gemini-quiz__options::-webkit-scrollbar {
        width: 6px;
      }

      .gemini-quiz__options::-webkit-scrollbar-track {
        background: rgba(107, 83, 53, 0.1);
        border-radius: 3px;
      }

      .gemini-quiz__options::-webkit-scrollbar-thumb {
        background: #a08060;
        border-radius: 3px;
      }

      .gemini-quiz__option {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 12px;
        background: rgba(255, 252, 245, 0.92);
        border: 2px solid #a08060;
        border-radius: 2px;
        cursor: pointer;
        transition: all 0.1s ease;
        color: #2c2416;
        text-align: left;
        width: 100%;
        box-sizing: border-box;
        flex-shrink: 0;
        box-shadow:
          inset -2px -2px 0 #8b7355,
          inset 2px 2px 0 #d4c8b0,
          2px 2px 0 rgba(0, 0, 0, 0.15);
      }

      .gemini-quiz__option:hover {
        background: rgba(198, 161, 90, 0.3);
        border-color: #8b7355;
        transform: translate(-1px, -1px);
        box-shadow:
          inset -2px -2px 0 #7a6245,
          inset 2px 2px 0 #d4c8b0,
          4px 4px 0 rgba(0, 0, 0, 0.2);
      }

      .gemini-quiz__option:active {
        transform: translate(1px, 1px);
        box-shadow:
          inset -1px -1px 0 #8b7355,
          inset 1px 1px 0 #c4b8a0,
          1px 1px 0 rgba(0, 0, 0, 0.1);
      }

      .gemini-quiz__option-key {
        min-width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #8b7355 0%, #6b5335 100%);
        border: 2px solid #5a4328;
        border-radius: 2px;
        color: #f5f0e6;
        font-family: "Press Start 2P", monospace;
        font-size: 10px;
        font-weight: 700;
        flex-shrink: 0;
        box-shadow:
          inset -2px -2px 0 #4a3318,
          inset 2px 2px 0 #a08060;
      }

      .gemini-quiz__option-text {
        flex: 1;
        min-width: 0;
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 14px;
        line-height: 1.5;
        padding-top: 3px;
        word-wrap: break-word;
      }

      .gemini-quiz__option--selected {
        background: rgba(34, 197, 94, 0.2) !important;
        border-color: #22c55e !important;
      }

      .gemini-quiz__option--correct {
        background: rgba(68, 204, 68, 0.4) !important;
        border-color: #44cc44 !important;
        animation: pixel-correct 0.3s steps(3);
      }

      .gemini-quiz__option--correct .gemini-quiz__option-key {
        background: linear-gradient(180deg, #44cc44 0%, #22aa22 100%);
        border-color: #16a34a;
      }

      @keyframes pixel-correct {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
      }

      .gemini-quiz__option--wrong {
        background: rgba(204, 68, 68, 0.4) !important;
        border-color: #cc4444 !important;
        animation: pixel-wrong 0.4s steps(4);
      }

      .gemini-quiz__option--wrong .gemini-quiz__option-key {
        background: linear-gradient(180deg, #cc4444 0%, #aa2222 100%);
        border-color: #991111;
      }

      @keyframes pixel-wrong {
        0%,
        25%,
        50%,
        75%,
        100% {
          transform: translateX(0);
        }
        12.5%,
        62.5% {
          transform: translateX(-4px);
        }
        37.5%,
        87.5% {
          transform: translateX(4px);
        }
      }

      .gemini-quiz__option--disabled {
        pointer-events: none;
        opacity: 0.7;
      }

      /* 提交按钮 */
      .gemini-quiz__submit {
        flex-shrink: 0;
        width: 100%;
        margin-top: 12px;
        padding: 12px 16px;
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 16px;
        color: #f5f0e6;
        background: linear-gradient(180deg, #8b7355 0%, #6b5335 100%);
        border: 3px solid #5a4328;
        border-radius: 2px;
        cursor: pointer;
        transition: all 0.15s ease;
        box-shadow:
          inset -3px -3px 0 #4a3318,
          inset 3px 3px 0 #a08060,
          4px 4px 0 rgba(0, 0, 0, 0.3);
      }

      .gemini-quiz__submit:hover:not(:disabled) {
        background: linear-gradient(180deg, #9b8365 0%, #7b6345 100%);
        transform: translate(-1px, -1px);
        box-shadow:
          inset -3px -3px 0 #4a3318,
          inset 3px 3px 0 #b09070,
          5px 5px 0 rgba(0, 0, 0, 0.35);
      }

      .gemini-quiz__submit:active:not(:disabled) {
        transform: translate(2px, 2px);
        box-shadow:
          inset -2px -2px 0 #4a3318,
          inset 2px 2px 0 #9a7a55,
          2px 2px 0 rgba(0, 0, 0, 0.2);
      }

      .gemini-quiz__submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .gemini-quiz__submit--ready {
        background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
        border-color: #15803d;
        animation: submit-pulse 1s ease-in-out infinite;
      }

      .gemini-quiz__submit--ready:hover:not(:disabled) {
        background: linear-gradient(180deg, #34d56e 0%, #1eb854 100%);
      }

      @keyframes submit-pulse {
        0%,
        100% {
          box-shadow:
            inset -3px -3px 0 #14532d,
            inset 3px 3px 0 #4ade80,
            4px 4px 0 rgba(0, 0, 0, 0.3),
            0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        50% {
          box-shadow:
            inset -3px -3px 0 #14532d,
            inset 3px 3px 0 #4ade80,
            4px 4px 0 rgba(0, 0, 0, 0.3),
            0 0 20px 4px rgba(34, 197, 94, 0.3);
        }
      }

      /* ========== Gemini 响应式适配 ========== */

      /* 大屏幕 */
      @media screen and (min-width: 1200px) and (min-height: 700px) {
        .gemini-quiz__main {
          width: min(420px, 80vw);
          height: min(620px, 85vh);
          padding: 20px;
        }

        .gemini-quiz__question-text {
          font-size: 16px;
        }

        .gemini-quiz__option-text {
          font-size: 15px;
        }

        .gemini-quiz__submit {
          font-size: 17px;
          padding: 14px 18px;
        }
      }

      /* 中等屏幕 */
      @media screen and (max-width: 900px), screen and (max-height: 600px) {
        .gemini-quiz__header {
          top: 8px;
          right: 12px;
          gap: 8px;
        }

        .gemini-quiz__boss {
          padding: 4px 8px;
        }

        .gemini-quiz__boss-icon {
          width: 24px;
          height: 24px;
        }

        .gemini-quiz__boss-name {
          font-size: 12px;
        }

        .gemini-quiz__timer {
          font-size: 10px;
          padding: 4px 8px;
        }

        .gemini-quiz__timer-icon {
          width: 14px;
          height: 14px;
        }

        .gemini-quiz__progress {
          font-size: 10px;
          padding: 4px 8px;
        }

        .gemini-quiz__dot {
          width: 8px;
          height: 8px;
        }

        .gemini-quiz__main {
          width: min(340px, 88vw);
          height: min(480px, 80vh);
          padding: 12px;
          border-width: 6px;
        }

        .gemini-quiz__main::before {
          width: 50px;
          height: 20px;
        }

        .gemini-quiz__question-box {
          padding: 10px 12px;
          margin-bottom: 10px;
        }

        .gemini-quiz__question-number {
          font-size: 11px;
          margin-bottom: 6px;
        }

        .gemini-quiz__question-text {
          font-size: 13px;
          line-height: 1.5;
        }


        .gemini-quiz__options {
          gap: 6px;
        }

        .gemini-quiz__option {
          padding: 8px 10px;
          gap: 8px;
        }

        .gemini-quiz__option-key {
          min-width: 24px;
          height: 24px;
          font-size: 9px;
        }

        .gemini-quiz__option-text {
          font-size: 12px;
          line-height: 1.4;
        }

        .gemini-quiz__submit {
          padding: 10px 14px;
          font-size: 14px;
          margin-top: 10px;
        }
      }

      /* 小屏幕手机横屏 */
      @media screen and (max-height: 450px) {
        .gemini-quiz__header {
          top: 6px;
          right: 10px;
          gap: 6px;
        }

        .gemini-quiz__boss {
          padding: 3px 6px;
        }

        .gemini-quiz__boss-icon {
          width: 20px;
          height: 20px;
        }

        .gemini-quiz__boss-name {
          font-size: 10px;
        }

        .gemini-quiz__timer,
        .gemini-quiz__progress {
          font-size: 9px;
          padding: 3px 6px;
        }

        .gemini-quiz__dot {
          width: 7px;
          height: 7px;
        }

        .gemini-quiz__main {
          width: min(300px, 90vw);
          height: min(380px, 85vh);
          padding: 10px;
          border-width: 5px;
        }

        .gemini-quiz__main::before {
          width: 40px;
          height: 16px;
        }

        .gemini-quiz__question-box {
          padding: 8px 10px;
          margin-bottom: 8px;
        }

        .gemini-quiz__question-number {
          font-size: 10px;
          margin-bottom: 4px;
        }

        .gemini-quiz__question-text {
          font-size: 11px;
          line-height: 1.4;
        }


        .gemini-quiz__options {
          gap: 5px;
        }

        .gemini-quiz__option {
          padding: 6px 8px;
          gap: 6px;
        }

        .gemini-quiz__option-key {
          min-width: 22px;
          height: 22px;
          font-size: 8px;
        }

        .gemini-quiz__option-text {
          font-size: 10px;
          line-height: 1.35;
        }

        .gemini-quiz__submit {
          padding: 8px 12px;
          font-size: 12px;
          margin-top: 8px;
        }
      }

      /* 极小高度屏幕 */
      @media screen and (max-height: 380px) {
        .gemini-quiz__main {
          width: min(280px, 92vw);
          height: min(320px, 88vh);
          padding: 8px;
          border-width: 4px;
        }

        .gemini-quiz__main::before {
          width: 36px;
          height: 14px;
        }

        .gemini-quiz__question-box {
          padding: 6px 8px;
          margin-bottom: 6px;
        }

        .gemini-quiz__question-number {
          font-size: 9px;
          margin-bottom: 3px;
        }

        .gemini-quiz__question-text {
          font-size: 10px;
          line-height: 1.3;
        }


        .gemini-quiz__option {
          padding: 5px 6px;
          gap: 5px;
        }

        .gemini-quiz__option-key {
          min-width: 20px;
          height: 20px;
          font-size: 7px;
        }

        .gemini-quiz__option-text {
          font-size: 9px;
          line-height: 1.3;
        }

        .gemini-quiz__submit {
          padding: 6px 10px;
          font-size: 11px;
          margin-top: 6px;
        }
      }

      /* 超宽屏幕优化 */
      @media screen and (min-width: 1600px) and (min-height: 800px) {

          padding-bottom: 5px;
        }
      }

      .claude-puzzle__workspace {
        position: relative;
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 10px;
        flex-direction: row;
      }

      @media (max-width: 600px), (max-height: 400px) {
        .claude-puzzle__pieces-container {
          flex-direction: row;
          flex-wrap: wrap;
          width: 100%;
          max-width: 100%;
          max-height: 100px;
          overflow-x: auto;
          overflow-y: hidden;
          justify-content: center;
          padding: 6px;
          gap: 4px;
        }
      }

      .claude-puzzle__board-container {
        position: relative;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .claude-puzzle__board {
        position: relative;
        background-image: url("/static/卡槽底版.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        /* 反转颜色提高可读性 */
        filter: invert(1) hue-rotate(180deg);
      }

      .claude-puzzle__board--complete {
        background-image: url("/static/第三关组装结果.png");
        filter: none;
      }

      .claude-puzzle__drop-zone {
        position: absolute;
        border: 2px dashed transparent;
        transition: all 0.2s ease;
        pointer-events: auto;
      }

      .claude-puzzle__drop-zone--available {
        border-color: transparent;
        background: transparent;
      }

      .claude-puzzle__drop-zone--hover {
        border-color: #22c55e;
        background: rgba(34, 197, 94, 0.3);
        box-shadow: inset 0 0 20px rgba(34, 197, 94, 0.4);
      }

      .claude-puzzle__drop-zone--locked {
        pointer-events: none;
        opacity: 0.2;
      }

      .claude-puzzle__drop-zone--placed {
        border-color: transparent;
        background: transparent;
        pointer-events: none;
      }

      .claude-puzzle__placed-piece {
        position: absolute;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        pointer-events: none;
        animation: piece-place 0.3s ease-out;
        /* 反转回来，因为board被反转了 */
        filter: invert(1) hue-rotate(180deg);
      }

      @keyframes piece-place {
        0% {
          transform: scale(1.1);
          opacity: 0.8;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* 传送带容器 */
      .claude-puzzle__conveyor-container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 160px;
        height: calc(100% - 20px);
        flex-shrink: 0;
        overflow: hidden;
      }

      .claude-puzzle__conveyor-title {
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 13px;
        color: #f59e0b;
        text-align: center;
        padding: 8px 0;
        flex-shrink: 0;
        z-index: 10;
        background: rgba(0, 0, 0, 0.9);
        width: 100%;
      }

      .claude-puzzle__conveyor-track {
        position: relative;
        flex: 1;
        width: 100%;
        overflow: hidden;
        background: linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.6) 0%,
          rgba(30, 30, 30, 0.8) 10%,
          rgba(30, 30, 30, 0.8) 90%,
          rgba(0, 0, 0, 0.6) 100%
        );
        border: 2px solid #444;
        border-radius: 4px;
      }

      /* 传送带滚动条纹背景 */
      .claude-puzzle__conveyor-track::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 8px,
          rgba(245, 158, 11, 0.1) 8px,
          rgba(245, 158, 11, 0.1) 10px
        );
        animation: conveyor-stripe-move 0.5s linear infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes conveyor-stripe-move {
        0% {
          background-position-y: 0;
        }
        100% {
          background-position-y: 10px;
        }
      }

      /* 传送带边缘渐变遮罩 */
      .claude-puzzle__conveyor-track::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.8) 0%,
          transparent 15%,
          transparent 85%,
          rgba(0, 0, 0, 0.8) 100%
        );
        pointer-events: none;
        z-index: 5;
      }

      .claude-puzzle__conveyor-belt {
        position: absolute;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 60px 10px;
        z-index: 1;
      }

      .claude-puzzle__piece {
        position: relative;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        cursor: grab;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          opacity 0.15s ease;
        flex-shrink: 0;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        background-color: rgba(40, 40, 40, 0.9);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }

      .claude-puzzle__piece:hover {
        transform: scale(1.12);
        box-shadow: 0 6px 20px rgba(245, 158, 11, 0.6);
        z-index: 10;
        border-color: #f59e0b;
      }

      .claude-puzzle__piece--dragging {
        cursor: grabbing;
        opacity: 0.5;
        transform: scale(0.9);
      }

      .claude-puzzle__piece--placed {
        display: none;
      }

      .claude-puzzle__piece--locked {
        opacity: 0.25;
        cursor: not-allowed;
        filter: grayscale(0.7) brightness(0.6);
        border-color: rgba(255, 255, 255, 0.05);
      }

      .claude-puzzle__piece--locked:hover {
        transform: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.05);
      }

      /* 移除标签样式，不再需要 */

      /* 响应式适配 - 移动端横屏 */
      @media (max-width: 900px), (max-height: 500px) {
        .claude-puzzle__conveyor-container {
          width: 120px;
        }

        .claude-puzzle__conveyor-title {
          font-size: 11px;
          padding: 6px 0;

          padding: 50px 8px;
        }
      }

      @media (max-width: 600px), (max-height: 400px) {
        .claude-puzzle__conveyor-container {
          width: 100px;
        }

        .claude-puzzle__conveyor-title {
          font-size: 10px;
          padding: 4px 0;
        }

        .claude-puzzle__conveyor-belt {
          gap: 12px;
          padding: 40px 6px;
        }
      }

      .claude-puzzle__hint {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.85);
        background: rgba(0, 0, 0, 0.8);
        padding: 8px 16px;
        z-index: 60;
        white-space: nowrap;
        border-radius: 4px;
        text-align: center;
      }

      @media (max-width: 600px), (max-height: 400px) {
        .claude-puzzle__hint {
          display: none;
        }
      }

      .claude-puzzle__current-layer {
        position: absolute;
        top: 70px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 15px;
        color: #fff;
        background: rgba(245, 158, 11, 0.9);
        padding: 6px 14px;
        border-radius: 4px;
        z-index: 60;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      @media (max-width: 600px), (max-height: 400px) {
        .claude-puzzle__current-layer {
          top: 45px;
          font-size: 12px;
          padding: 4px 10px;
        }
      }

      /* Claude 失败场景 */
      .claude-death-scene {
        position: fixed;
        inset: 0;
        z-index: 850;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-image: url("/static/第三关背景.png");
        background-size: cover;
        background-position: center;
        padding: 20px;
      }

      .claude-death-scene--active {
        display: flex;
      }

      .claude-death-scene__container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px;
        background: rgba(0, 0, 0, 0.8);
        border: 3px solid #444;
        max-width: 90vw;
        max-height: 90vh;
      }

      .claude-death-scene__claude {
        width: min(120px, 25vw);
        height: min(120px, 25vw);
        background-image: url("/static/Claude.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        margin-bottom: 20px;
        animation: claude-death-hover 1.2s ease-in-out infinite;
        filter: drop-shadow(0 0 15px #f59e0b);
      }

      @keyframes claude-death-hover {
        0%,
        100% {
          transform: translateY(0) rotate(-2deg);
        }
        50% {
          transform: translateY(-8px) rotate(2deg);
        }
      }

      .claude-death-scene__player {
        width: min(200px, 40vw);
        height: min(200px, 40vw);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center bottom;
      }

      .claude-death-scene__player--standing {
        background-image: url("/static/人物-停止.png");
      }

      .claude-death-scene__player--suicide {
        background-image: url("/static/人物-自尽.png");
        animation: claude-suicide-fall 0.6s ease-out forwards;
      }

      @keyframes claude-suicide-fall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(12px) rotate(-8deg);
          opacity: 0.8;
        }
      }

      .claude-death-scene__text {
        margin-top: 20px;
        font-family: "ZCOOL QingKe HuangYou", cursive;
        font-size: 16px;
        color: #ff4444;
        text-align: center;
        opacity: 0;
        transition: opacity 0.3s ease;
        max-width: 80vw;
        line-height: 1.6;
      }

      .claude-death-scene__text--visible {
        opacity: 1;

        function getRandomAvailablePiece() {
          // 获取当前层可用的组件

          const conveyorPieceIds = new Set(
            claudeConveyorItems.map((item) => item.pieceId),
          );
          const availablePieces = currentLayerPieces.filter(
            (id) => !claudePlacedPieces.has(id) && !conveyorPieceIds.has(id),
          );

          if (availablePieces.length === 0) return null;

          // 随机选择一个
          return availablePieces[
            Math.floor(Math.random() * availablePieces.length)
          ];

        function spawnConveyorItem(container) {
          const belt = container.querySelector('[data-role="conveyor-belt"]');
          if (!belt) return;

          // 限制传送带上的组件数量
          if (claudeConveyorItems.length >= CLAUDE_CONVEYOR_MAX_ITEMS) return;

          const pieceId = getRandomAvailablePiece();

          const config = CLAUDE_PIECE_CONFIG[pieceId];

          const viewWidth = window.innerWidth;
          const isSmallScreen = viewWidth <= 900;
          const pieceMaxWidth = isSmallScreen ? 72 : 92;
          const pieceMaxHeight = isSmallScreen ? 54 : 66;

          const ratio = Math.min(
            pieceMaxWidth / config.width,
            pieceMaxHeight / config.height,

          );

          const displayHeight = Math.max(config.height * ratio, 25);

          const piece = document.createElement("div");
          piece.className = "claude-puzzle__piece";
          piece.dataset.pieceId = pieceId;
          piece.dataset.conveyorId = Date.now() + Math.random();
          piece.style.width = `${displayWidth}px`;
          piece.style.height = `${displayHeight}px`;
          piece.style.backgroundImage = `url('${config.image}')`;

          // 初始位置在顶部外面

            element: piece,
            pieceId: pieceId,
            y: -CLAUDE_CONVEYOR_ITEM_HEIGHT,
            conveyorId: piece.dataset.conveyorId,
          };

          claudeConveyorItems.push(itemData);
          belt.appendChild(piece);

          updateConveyorItemPosition(piece, itemData.y);

        function startConveyorAnimation(container) {
          const belt = container.querySelector('[data-role="conveyor-belt"]');
          const track = container.querySelector('[data-role="conveyor-track"]');
          if (!belt || !track) return;

          const trackHeight = track.clientHeight;
          let lastTime = performance.now();
          let lastSpawnTime = 0;

          function animate(currentTime) {
            if (!isFighting || currentBoss !== "claude") {
              return;

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // 计算速度（根据剩余时间加速）
            const timeRatio = 1 - claudeTimeLeft / CLAUDE_TIME_LIMIT;
            const speedMultiplier = 1 + timeRatio * 0.8; // 最多加速80%
            const currentSpeed = claudeConveyorSpeed * speedMultiplier;

            // 动态调整生成间隔
            claudeSpawnInterval = Math.max(600, 1200 - timeRatio * 500);

            if (currentTime - lastSpawnTime > claudeSpawnInterval) {
              spawnConveyorItem(container);

              lastSpawnTime =
                currentTime + (Math.random() - 0.5) * claudeSpawnInterval * 0.3;

              const item = claudeConveyorItems[i];

        function setupClaudeDragDrop(container) {
          const belt = container.querySelector('[data-role="conveyor-belt"]');
          const board = container.querySelector('[data-role="puzzle-board"]');

          // 事件委托处理拖拽
          function handleDragStart(e) {
            const piece = e.target.closest(".claude-puzzle__piece");
            if (!piece) return;

            const pieceId = piece.dataset.pieceId;
            const conveyorId = piece.dataset.conveyorId;

            // 检查是否可以拖动
            if (piece.classList.contains("claude-puzzle__piece--locked")) {
              return;
            }

            e.preventDefault();

            // 找到对应的传送带项
            const conveyorItem = claudeConveyorItems.find(
              (item) => item.element.dataset.conveyorId === conveyorId,
            );

            claudeDraggingPiece = {
              pieceId,
              conveyorId,
              element: piece,
              conveyorItem,
            };
            piece.classList.add("claude-puzzle__piece--dragging");

            // 获取初始位置
            const rect = piece.getBoundingClientRect();
            const clientX = e.type.includes("touch")
              ? e.touches[0].clientX
              : e.clientX;
            const clientY = e.type.includes("touch")
              ? e.touches[0].clientY
              : e.clientY;

            claudeDragOffset.x = clientX - rect.left;
            claudeDragOffset.y = clientY - rect.top;

            // 创建拖拽幽灵
            const config = CLAUDE_PIECE_CONFIG[pieceId];
            const ghostScale = claudeBoardScale;

            claudeDragGhost = document.createElement("div");
            claudeDragGhost.className = "claude-puzzle__drag-ghost";
            claudeDragGhost.style.width = `${config.width * ghostScale}px`;
            claudeDragGhost.style.height = `${config.height * ghostScale}px`;
            claudeDragGhost.style.backgroundImage = `url('${config.image}')`;
            claudeDragGhost.style.left = `${clientX - (config.width * ghostScale) / 2}px`;
            claudeDragGhost.style.top = `${clientY - (config.height * ghostScale) / 2}px`;
            document.body.appendChild(claudeDragGhost);
