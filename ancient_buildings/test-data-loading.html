<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据加载测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .status {
      padding: 20px;
      border-radius: 8px;
      margin: 10px 0;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
    }
    pre {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>古建筑数据加载测试</h1>
  
  <div id="status"></div>
  
  <h2>数据统计</h2>
  <div id="stats"></div>
  
  <h2>示例数据（前5个）</h2>
  <div id="sample"></div>
  
  <script>
    const statusDiv = document.getElementById('status');
    const statsDiv = document.getElementById('stats');
    const sampleDiv = document.getElementById('sample');
    
    try {
      statusDiv.innerHTML = '<div class="status info">开始加载数据...</div>';
      
      fetch('../src/data/building_coords.json')
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP错误: ${response.status}`);
          }
          return response.json();
        })
        .then(data => {
          statusDiv.innerHTML = '<div class="status success">✅ 数据加载成功！</div>';
          
          const stats = `
            <div class="status info">
              <p><strong>总建筑数:</strong> ${data.length}</p>
              <p><strong>数据类型:</strong> ${Array.isArray(data) ? '数组' : typeof data}</p>
              <p><strong>第一个元素:</strong> ${data.length > 0 ? '存在' : '不存在'}</p>
            </div>
          `;
          statsDiv.innerHTML = stats;
          
          if (data.length > 0) {
            const sample = data.slice(0, 5);
            sampleDiv.innerHTML = `<pre>${JSON.stringify(sample, null, 2)}</pre>`;
          } else {
            sampleDiv.innerHTML = '<div class="status error">没有数据</div>';
          }
        })
        .catch(error => {
          console.error('加载错误:', error);
          statusDiv.innerHTML = `<div class="status error">❌ 数据加载失败: ${error.message}</div>`;
          statsDiv.innerHTML = `<div class="status error">错误详情: ${error.message}</div>`;
        });
    } catch (error) {
      console.error('脚本错误:', error);
      statusDiv.innerHTML = `<div class="status error">❌ 脚本错误: ${error.message}</div>`;
    }
  </script>
</body>
</html>
