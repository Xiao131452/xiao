<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营造法式：古建消消乐</title>
    <script>
        if (new URLSearchParams(location.search).get('embed') === '1') {
            document.documentElement.classList.add('embed-slot');
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "KaiTi", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #3d2e24;
            /* 与主站 public/images/game-yingzao-bg.jpg 同源（由 game1/ph.jpg 提供） */
            background-image:
                linear-gradient(165deg, rgba(92, 72, 56, 0.48) 0%, rgba(61, 46, 36, 0.52) 40%, rgba(34, 26, 20, 0.62) 100%),
                url('../../images/game-yingzao-bg.jpg');
            background-position: center, center;
            background-size: cover, cover;
            background-repeat: no-repeat, no-repeat;
            background-attachment: fixed, fixed;
            color: #5d4037;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            margin-top: 20px;
            letter-spacing: 4px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* 自动洗牌提示框 */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 3000;
            display: none;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; top: 0px; }
            15% { opacity: 1; top: 30px; }
            85% { opacity: 1; top: 30px; }
            100% { opacity: 0; top: 0px; }
        }

        /* 主菜单样式 */
        #main-menu {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(28, 22, 18, 0.45) 0%, rgba(18, 14, 12, 0.55) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #main-menu h1 {
            color: #f4e8d3;
            font-size: 42px;
            margin-bottom: 40px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }
        #main-menu .menu-btn {
            padding: 15px 50px;
            font-size: 22px;
            background: linear-gradient(180deg, #d4a574 0%, #8b5a2b 100%);
            color: #f4e8d3;
            border: 3px solid #f4e8d3;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        #main-menu .menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(244, 232, 211, 0.5);
        }
        #main-menu .story-text {
            color: #f4e8d3;
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
            line-height: 1.8;
        }

        /* 游戏界面 */
        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        #info-panel {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            background: #8b5a2b;
            color: #f4e8d3;
            padding: 10px 20px;
            border-radius: 8px;
        }
        #target-panel {
            width: 400px;
            background: #a0522d;
            color: #f4e8d3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        /* 棋盘样式 */
        #game-board {
            display: grid;
            gap: 4px;
            background: rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3), inset 0 2px 10px rgba(255,255,255,0.1);
            border: 4px solid rgba(93, 64, 55, 0.8);
            backdrop-filter: blur(5px);
        }

        /* 单个建材方块样式 */
        .cell {
            width: 55px; height: 55px;
            background: linear-gradient(135deg, #deb887 0%, #c4a068 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            cursor: pointer;
            border-radius: 8px;
            user-select: none;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
        }
        .cell:hover { transform: scale(1.08); }
        .cell.selected {
            border: 4px solid #d32f2f;
            box-sizing: border-box;
            background: linear-gradient(135deg, #ffdead 0%, #ff8c00 100%);
            animation: pulse 0.5s infinite;
        }
        .cell.empty { background-color: transparent; font-size: 0; box-shadow: none; }
        .cell.obstacle { cursor: not-allowed; }

        /* 障碍物样式 */
        .cell.stone-lion {
            background: linear-gradient(135deg, #808080 0%, #505050 100%);
            opacity: 0.95;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .cell.stone-lion::after {
            content: '🦁';
            font-size: 36px;
            position: absolute;
        }

        /* 冰封视觉优化：极高透明度，清晰透出底层，带边框和角落标记 */
        .cell.frozen::after {
            content: '❄️';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(30, 144, 255, 0.3); /* 蓝色冰层底色 */
            border: 3px solid rgba(0, 105, 200, 0.9); /* 清晰的深蓝冰层边框 */
            border-radius: 8px;
            display: flex;
            justify-content: flex-end; /* 图标靠右 */
            align-items: flex-start;  /* 图标靠上 */
            padding: 2px;
            font-size: 14px; /* 图标缩小，不挡主体 */
            pointer-events: none;
            box-shadow: inset 0 0 12px rgba(255,255,255,0.7), 0 0 8px rgba(30, 144, 255, 0.5);
            z-index: 2;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 10px gold; } 50% { text-shadow: 0 0 25px gold; } }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: rgba(244, 232, 211, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 5px solid rgba(139, 90, 43, 0.8);
            max-width: 550px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .modal-content h2 {
            color: #8b5a2b;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .modal-content p {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 25px;
            color: #5d4037;
        }
        .modal-content .reward-icon {
            font-size: 80px;
            display: block;
            margin: 20px 0;
            animation: glow 1.5s infinite;
        }
        .modal-btn {
            padding: 12px 30px;
            font-size: 20px;
            background: linear-gradient(180deg, #d4a574 0%, #8b5a2b 100%);
            color: #f4e8d3;
            border: 3px solid #f4e8d3;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            margin: 0 10px;
        }
        .modal-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(244, 232, 211, 0.5);
        }

        /* 按钮样式 */
        .bottom-btns {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button.action-btn {
            padding: 12px 30px;
            background: #8b5a2b;
            color: #f4e8d3;
            border: 2px solid #f4e8d3;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-family: inherit;
            transition: all 0.3s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        button.action-btn:hover {
            background: #a0522d;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        /* 知识卡片样式 */
        .knowledge-panel {
            position: fixed;
            left: 0;
            top: 0;
            width: 320px;
            height: 100vh;
            background: linear-gradient(135deg, #f4e8d3 0%, #d4c4a8 100%);
            border-right: 4px solid #8b5a2b;
            box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            z-index: 3000;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            transition: transform 0.3s ease;
            /* 隐藏滚动条但保留滚动功能 */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        .knowledge-panel::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }
        .knowledge-panel.hidden {
            transform: translateX(-100%);
        }
        .knowledge-toggle {
            position: fixed;
            left: 324px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(180deg, #d4a574 0%, #8b5a2b 100%);
            color: #f4e8d3;
            border: 3px solid #f4e8d3;
            border-radius: 0 10px 10px 0;
            padding: 15px 10px;
            cursor: pointer;
            font-size: 24px;
            z-index: 3001;
            transition: all 0.3s;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }
        .knowledge-toggle:hover {
            transform: translateY(-50%) translateX(3px);
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }
        .knowledge-card {
            background: rgba(255,255,255,0.6);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #8b5a2b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .knowledge-card h3 {
            color: #8b5a2b;
            font-size: 20px;
            margin-bottom: 12px;
            border-bottom: 2px solid #d4a574;
            padding-bottom: 8px;
        }
        .knowledge-card h4 {
            color: #5d4037;
            font-size: 16px;
            margin: 15px 0 10px 0;
        }
        .knowledge-card p,
        .knowledge-card li {
            color: #5d4037;
            font-size: 14px;
            line-height: 1.8;
        }
        .knowledge-card ul {
            padding-left: 20px;
        }
        .knowledge-icon {
            font-size: 28px;
            margin-right: 8px;
        }

        /* 地图页 iframe（?embed=1）：铺满槽位、压缩边距与棋盘格 */
        html.embed-slot,
        html.embed-slot body {
            height: 100%;
            min-height: 0;
        }
        html.embed-slot body {
            padding: 4px 6px;
            box-sizing: border-box;
            align-items: stretch;
            justify-content: flex-start;
            overflow-x: hidden;
            overflow-y: auto;
        }
        html.embed-slot #main-menu h1 {
            font-size: clamp(16px, 4.2vmin, 22px);
            margin: 8px 0 10px;
            letter-spacing: 0.08em;
        }
        html.embed-slot #main-menu .story-text {
            font-size: 13px;
            line-height: 1.55;
            margin-bottom: 12px;
            padding: 0 6px;
        }
        html.embed-slot #main-menu .menu-btn {
            padding: 8px 20px;
            font-size: 15px;
            margin: 6px;
        }
        html.embed-slot #game-container > h1 {
            display: none;
        }
        html.embed-slot #game-container {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            align-items: center;
        }
        html.embed-slot #info-panel,
        html.embed-slot #target-panel {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }
        html.embed-slot #info-panel {
            font-size: 13px;
            padding: 6px 10px;
            margin-bottom: 6px;
        }
        html.embed-slot #target-panel {
            font-size: 12px;
            padding: 6px 8px;
            margin-bottom: 6px;
        }
        html.embed-slot #goal-items {
            font-size: 15px !important;
            gap: 10px !important;
            flex-wrap: wrap;
        }
        html.embed-slot #game-board {
            padding: 6px;
            gap: 3px;
            margin: 0 auto;
            max-width: 100%;
            box-sizing: border-box;
        }
        html.embed-slot .cell {
            width: 44px;
            height: 44px;
            font-size: 26px;
        }
        html.embed-slot .cell.stone-lion::after {
            font-size: 26px;
        }
        html.embed-slot .bottom-btns {
            margin-top: 6px;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        html.embed-slot button.action-btn {
            padding: 6px 12px;
            font-size: 13px;
        }
        html.embed-slot .knowledge-panel {
            width: min(240px, 88vw);
            height: 100%;
            padding: 10px;
        }
        html.embed-slot .knowledge-toggle {
            left: min(248px, calc(88vw - 36px));
            right: auto;
            top: 38%;
            transform: translateY(-50%);
            border-radius: 0 10px 10px 0;
            padding: 10px 6px;
            font-size: 18px;
        }
        /* 父页全屏后 iframe 变大：棋盘恢复更接近完整版尺寸 */
        @media (min-width: 720px) and (min-height: 560px) {
            html.embed-slot .cell {
                width: 52px;
                height: 52px;
                font-size: 32px;
            }
            html.embed-slot .cell.stone-lion::after {
                font-size: 32px;
            }
            html.embed-slot #info-panel {
                font-size: 16px;
            }
            html.embed-slot #target-panel {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="main-menu">
    <h1>🏮 营造法式：古建消消乐 🏮</h1>
    <p class="story-text">
        大宋崇宁年间，朝廷兴建明堂，征调天下巧匠。<br>
        你身为将作监匠师，需采集各类建材，营造成传世殿宇。<br>
        消除建材以收集构件，破除障碍，最终建成千古留名的殿堂！
    </p>
    <button class="menu-btn" onclick="startGame()">开始营造</button>
    <button class="menu-btn" onclick="showStory()">故事背景</button>
</div>

<div id="game-container">
    <h1>🏮 营造法式 🏮</h1>

    <!-- 知识卡片面板 -->
    <div id="knowledge-panel" class="knowledge-panel">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: #8b5a2b; font-size: 22px;">📚 营造知识库</h2>
        </div>
        <div id="knowledge-content"></div>
    </div>
    
    <!-- 知识卡片切换按钮 -->
    <button id="knowledge-toggle" class="knowledge-toggle" onclick="toggleKnowledgePanel()" title="展开/收起知识卡片">📜</button>

    <div id="info-panel">
        <span>关卡：<span id="level-display">1</span></span>
        <span>步数：<span id="moves-display">无限制</span></span>
    </div>

    <div id="target-panel">
        <div style="text-align: center; margin-bottom: 8px;">
            <strong>本关目标：</strong>
        </div>
        <div id="goal-items" style="display: flex; justify-content: center; gap: 20px; font-size: 20px;"></div>
    </div>

    <div id="game-board"></div>

    <div class="bottom-btns">
        <button class="action-btn" onclick="initLevel()">重新开始本关</button>
        <button class="action-btn" onclick="backToMenu()" style="background: #5d4037;">返回主菜单</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<script>
    const MATERIALS = {
        'brick': '🧱', 'wood': '🪵', 'stone': '🪨', 'tile': '🏮', 'xunzhang': '📯',
        'palace': '🏛️', 'gate': '⛩️', 'pavilion': '🏯', 'dragon': '🐉', 'lion': '🦁'
    };

    const LEVELS = [
        {
            title: "第一关：学徒营造",
            mats: ['brick', 'wood', 'stone', 'tile', 'xunzhang'],
            goals: { 'tile': 20, 'xunzhang': 20 },
            size: 6,
            obstacles: false,
            reward: "获得奖励：【殿堂级构件】🏛️",
            rewardIcon: '🏛️',
            story: "初为学徒，从基础学起。收集瓦当与纹章，为营造大殿做准备。",
            nextStory: "技艺精进，即将参与皇家工程！",
            nextRules: "第二关：收集殿堂构件，解锁更高阶建筑"
        },
        {
            title: "第二关：大匠修缮",
            mats: ['brick', 'wood', 'stone', 'tile', 'xunzhang', 'palace'],
            goals: { 'palace': 15 },
            size: 7,
            obstacles: false,
            reward: "获得奖励：【皇家宫门】⛩️",
            rewardIcon: '⛩️',
            story: "技艺渐精，参与宫门建造。收集殿堂构件，彰显皇家气派。",
            nextStory: "终极考验！御花园亭台工程开启！",
            nextRules: "第三关：破冰除障，收集 20 个龙纹和 15 个亭子构件！"
        },
        {
            title: "第三关：紫禁之巅",
            mats: ['tile','xunzhang','palace','gate','dragon', 'pavilion'],
            goals: { 'dragon': 20, 'pavilion': 15 },
            size: 8,
            obstacles: true,
            frozenCount: 6, // 调整为6个冰封
            stoneLionCount: 3,
            reward: "【单檐木亭】终极建筑解锁！",
            rewardIcon: '🏯',
            story: "御花园单檐木亭落成，雕梁画栋，龙纹点缀，彰显大宋气象！<br>你已成为传世匠师，名留《营造法式》，功德圆满！"
        }
    ];

    let currentLvlIdx = 0; // 从第一关开始
    let board = [];
    let obstacleBoard = [];
    let progress = {};
    let selected = null;
    let isProcessing = false;
    let gameStarted = false;
    let isKnowledgePanelHidden = false; // 知识卡片默认展开
    
    // 知识卡片数据
    const KNOWLEDGE_CARDS = [
        {
            title: "📜 学徒入门·《营造法式》基础认知",
            theme: '古建营造的“入门必修课”',
            content: `
                <p><strong>科普要点：</strong></p>
                <ul>
                    <li>《营造法式》是北宋徽宗年间（崇宁二年，公元 1103 年）官方颁布的建筑技术专著，由将作监少监李诫编撰，是中国古代建筑史上最完整、最系统的建筑规范典籍，也是世界上最早的建筑工程手册之一。</li>
                    <li>游戏第一关收集的瓦当（🏮）、基础建材（🪵🪨），正是《营造法式》中"小木作""石作""瓦作"的基础构件：瓦当用于屋顶檐头装饰，刻有花纹，兼具防水与美观；木材用于搭建房屋主体，石材用于地基、台阶。</li>
                    <li><strong>核心意义：</strong>在《营造法式》颁布之前，古代建筑施工多凭工匠经验，无统一规范。该书首次系统规范了建筑构件的规格、形制和工艺，让"学徒营造"有章可循，为后续皇家建筑营造打下坚实基础。</li>
                </ul>
            `
        },
        {
            title: "🏛️ 大匠进阶·《营造法式》的核心规范",
            theme: '皇家建筑的“营造准则”',
            content: `
                <p><strong>科普要点：</strong></p>
                <ul>
                    <li>《营造法式》将建筑工种细分为"大木作""小木作""石作""瓦作""彩画作"等 13 个工种。游戏第二关收集的殿堂构件（🏛️）、皇家宫门（⛩️），属于"大木作"核心内容——负责建筑主体结构（立柱、横梁、屋顶），是皇家建筑的"骨架"。</li>
                    <li>书中明确规定了皇家建筑的等级形制：如殿堂的开间数（皇家宫殿多为 9 开间）、屋脊装饰的样式、构件的尺寸，均与使用者的身份等级严格对应。</li>
                    <li><strong>关键工艺：</strong>"斗拱"是《营造法式》记载的核心结构，被誉为"中国古建的灵魂"。它由斗、拱、昂等构件组合而成，既能承重、分散屋顶压力，又能起到装饰作用。</li>
                </ul>
            `
        },
        {
            title: "🏯 紫禁之巅·《营造法式》的终极应用",
            theme: '御花园亭台的"营造精髓"',
            content: `
                <p><strong>科普要点：</strong></p>
                <ul>
                    <li>游戏第三关的单檐木亭（🏯）、龙纹构件（🐉），均源自《营造法式》中"园林建筑"的记载。御花园亭台属于"小木作"中的精品，讲究"小巧精致、与景相融"，单檐、攒尖顶，立柱间距、屋顶坡度均有规范。</li>
                    <li>书中记载，皇家园林建筑的屋脊装饰（如龙纹）、亭台形制，需兼顾实用性与观赏性：龙纹作为皇权的象征，仅可用于皇家建筑；亭台则需根据园林景致布局，做到"借景""融景"。</li>
                    <li><strong>终极内涵：</strong>《营造法式》的核心是"天人合一"，强调建筑与自然、与皇权的和谐统一。游戏中 3 座石狮子摆件（🦁）寓意"镇守四方、吉祥如意"，象征着皇家威严与守护，体现了古建营造中"以兽护法、趋吉避凶"的传统理念，这也是匠师对工程圆满、家国安康的美好祈愿。</li>
                </ul>
            `
        }
    ];

    // Toast 提示框工具
    function showToast(msg) {
        let toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        toast.style.animation = 'none';
        setTimeout(() => { toast.style.animation = 'fadeInOut 2.5s forwards'; }, 10);
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    function showMainMenu() {
        document.getElementById('main-menu').style.display = 'flex';
        document.getElementById('game-container').style.display = 'none';
    }

    function startGame() {
        gameStarted = true;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        initLevel();
    }

    function backToMenu() {
        gameStarted = false;
        showMainMenu();
    }

    function showStory() {
        const modal = document.getElementById('modal');
        const body = document.getElementById('modal-body');
        body.innerHTML = `
            <h2>📜 故事背景</h2>
            <p style="text-align: left; line-height: 2;">
                大宋崇宁年间，朝廷决定兴建一座前所未有的明堂，以彰国威。<br>
                天下巧匠云集于东京汴梁，你身为将作监的匠师，肩负重任。<br><br>
                <strong>游戏规则：</strong><br>
                1. 点击相邻的两个建材进行交换，三个或以上连成一线即可消除。<br>
                2. 冰封破除：在冰封位置参与三连消时，会震碎冰层但保留该位置的建材！<br>
                3. 石狮子为皇家摆件，不可移动、不可消除，请注意避让。<br>
                4. 第三关目标：收集 20 个龙纹构件🐉 + 15 个亭子构件🏯，并破除所有 6 个冰封障碍❄️。<br>
                5. 若场上无路可走，系统会自动为您洗牌！
            </p>
            <button class="modal-btn" onclick="document.getElementById('modal').style.display='none'">我知道了</button>
        `;
        modal.style.display = 'flex';
    }
    
    // 切换知识卡片显示/隐藏
    function toggleKnowledgePanel() {
        const panel = document.getElementById('knowledge-panel');
        const btn = document.getElementById('knowledge-toggle');
        isKnowledgePanelHidden = !isKnowledgePanelHidden;
        
        if (isKnowledgePanelHidden) {
            panel.classList.add('hidden');
            btn.style.left = '10px';
            btn.innerHTML = '📖';
        } else {
            panel.classList.remove('hidden');
            btn.style.left = '324px';
            btn.innerHTML = '📜';
        }
    }
    
    // 更新知识卡片内容
    function updateKnowledgeCard() {
        const container = document.getElementById('knowledge-content');
        const card = KNOWLEDGE_CARDS[currentLvlIdx];
        
        container.innerHTML = `
            <div class="knowledge-card">
                <h3>${card.title}</h3>
                <h4 style="text-align: center; font-style: italic;">${card.theme}</h4>
                ${card.content}
            </div>
        `;
    }

    function initLevel() {
        const lv = LEVELS[currentLvlIdx];
        document.getElementById('level-display').innerText = currentLvlIdx + 1;
        document.getElementById('moves-display').innerText = "无限制";
        
        // 更新知识卡片
        updateKnowledgeCard();

        board = [];
        obstacleBoard = [];
        progress = {};
        for (let m in lv.goals) progress[m] = 0;

        for (let r = 0; r < lv.size; r++) {
            board[r] = [];
            obstacleBoard[r] = [];
            for (let c = 0; c < lv.size; c++) {
                let available = lv.mats.filter(m => {
                    let matchV = r >= 2 && board[r-1][c] === m && board[r-2][c] === m;
                    let matchH = c >= 2 && board[r][c-1] === m && board[r][c-2] === m;
                    return !matchV && !matchH;
                });
                board[r][c] = available.length > 0 ? available[Math.floor(Math.random() * available.length)] : lv.mats[0];
                obstacleBoard[r][c] = null;
            }
        }

        if (lv.frozenCount) {
            let lionPlaced = 0;
            while (lionPlaced < lv.stoneLionCount) {
                let r = Math.floor(Math.random() * lv.size);
                let c = Math.floor(Math.random() * lv.size);
                if (!obstacleBoard[r][c]) {
                    obstacleBoard[r][c] = 'stone-lion';
                    board[r][c] = 'lion';
                    lionPlaced++;
                }
            }

            let placed = 0;
            let attempts = 0;
            const maxAttempts = 1000; // 防止死循环
            const minDistance = 2; // 最小距离（曼哈顿距离）
            
            while (placed < lv.frozenCount && attempts < maxAttempts) {
                let r = Math.floor(Math.random() * lv.size);
                let c = Math.floor(Math.random() * lv.size);
                attempts++;
                
                if (obstacleBoard[r][c]) continue;
                
                // 检查与已放置的冰封的距离
                let tooClose = false;
                for (let rr = 0; rr < lv.size; rr++) {
                    for (let cc = 0; cc < lv.size; cc++) {
                        if (obstacleBoard[rr][cc] === 'frozen') {
                            // 计算曼哈顿距离
                            const distance = Math.abs(r - rr) + Math.abs(c - cc);
                            if (distance <= minDistance) {
                                tooClose = true;
                                break;
                            }
                        }
                    }
                    if (tooClose) break;
                }
                
                if (!tooClose) {
                    obstacleBoard[r][c] = 'frozen';
                    board[r][c] = lv.mats[Math.floor(Math.random() * lv.mats.length)];
                    placed++;
                }
            }
            
            // 如果因为太严格导致无法放置足够冰封，降低要求
            if (placed < lv.frozenCount) {
                for (let r = 0; r < lv.size && placed < lv.frozenCount; r++) {
                    for (let c = 0; c < lv.size && placed < lv.frozenCount; c++) {
                        if (!obstacleBoard[r][c]) {
                            obstacleBoard[r][c] = 'frozen';
                            board[r][c] = lv.mats[Math.floor(Math.random() * lv.mats.length)];
                            placed++;
                        }
                    }
                }
            }
        }

        renderGoal();
        renderBoard();
        checkAndClear();
    }

    function renderBoard() {
        const lv = LEVELS[currentLvlIdx];
        const container = document.getElementById('game-board');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${lv.size}, 55px)`;

        for (let r = 0; r < lv.size; r++) {
            for (let c = 0; c < lv.size; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';

                if (board[r][c] === null) {
                    cell.classList.add('empty');
                } else {
                    cell.innerText = MATERIALS[board[r][c]] || board[r][c];
                }

                if (obstacleBoard[r][c]) {
                    cell.classList.add(obstacleBoard[r][c]);
                    cell.classList.add('obstacle');

                    // 石狮子挡住底层，冰封则全透视
                    if (obstacleBoard[r][c] === 'stone-lion') {
                        cell.innerText = '';
                    }
                }

                if (selected && selected.r === r && selected.c === c) cell.classList.add('selected');

                cell.onclick = () => handleSelect(r, c);
                container.appendChild(cell);
            }
        }
    }

    function renderGoal() {
        const lv = LEVELS[currentLvlIdx];
        const container = document.getElementById('goal-items');
        container.innerHTML = '';
        for (let m in lv.goals) {
            const icon = m === 'pavilion' ? '🏯' : (MATERIALS[m] || m);
            const div = document.createElement('div');
            div.innerHTML = `${icon} <span style="background: #8b5a2b; padding: 2px 10px; border-radius: 12px; font-weight: bold; color: white;">${progress[m]}/${lv.goals[m]}</span>`;
            container.appendChild(div);
        }

        if (lv.frozenCount) {
            let currentFrozen = 0;
            for(let r=0; r<lv.size; r++) {
                for(let c=0; c<lv.size; c++) {
                    if(obstacleBoard[r][c] === 'frozen') currentFrozen++;
                }
            }
            const iceDiv = document.createElement('div');
            iceDiv.innerHTML = `❄️ <span style="background: #4a7c4a; padding: 2px 10px; border-radius: 12px; font-weight: bold; color: white;">${currentFrozen}</span>`;
            container.appendChild(iceDiv);
        }
    }

    function handleSelect(r, c) {
        if (isProcessing) return;
        if (obstacleBoard[r][c] === 'frozen' || obstacleBoard[r][c] === 'stone-lion') return;

        if (!selected) {
            selected = { r, c };
            renderBoard();
        } else {
            const dr = Math.abs(selected.r - r);
            const dc = Math.abs(selected.c - c);
            if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                swapData(selected.r, selected.c, r, c);
                if (findMatches()) {
                    isProcessing = true;
                    selected = null;
                    renderBoard(); // 先渲染交换效果
                    setTimeout(processMatches, 300);
                } else {
                    swapData(selected.r, selected.c, r, c); // 换回来
                    selected = null;
                    renderBoard();
                }
            } else {
                selected = { r, c };
                renderBoard();
            }
        }
    }

    function swapData(r1, c1, r2, c2) {
        let temp = board[r1][c1];
        board[r1][c1] = board[r2][c2];
        board[r2][c2] = temp;
    }

    function findMatches() {
        const lv = LEVELS[currentLvlIdx];
        let matched = Array(lv.size).fill().map(() => Array(lv.size).fill(false));
        let found = false;

        for (let r = 0; r < lv.size; r++) {
            for (let c = 0; c < lv.size - 2; c++) {
                if (board[r][c] && board[r][c] !== 'lion' &&
                    board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) {
                    matched[r][c] = matched[r][c+1] = matched[r][c+2] = true;
                    found = true;
                }
            }
        }
        for (let c = 0; c < lv.size; c++) {
            for (let r = 0; r < lv.size - 2; r++) {
                if (board[r][c] && board[r][c] !== 'lion' &&
                    board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) {
                    matched[r][c] = matched[r+1][c] = matched[r+2][c] = true;
                    found = true;
                }
            }
        }
        return found ? matched : null;
    }

    function processMatches() {
        const matched = findMatches();
        if (!matched) {
            isProcessing = false;

            // 死局检测逻辑
            if (!isGameWon() && !hasPossibleMoves()) {
                setTimeout(() => {
                    showToast("死局检测：已为您自动洗牌！");
                    safeShuffle();
                }, 300);
            } else {
                checkWin(); // 正常触发通关结算
            }
            return;
        }

        const lv = LEVELS[currentLvlIdx];
        for (let r = 0; r < lv.size; r++) {
            for (let c = 0; c < lv.size; c++) {
                if (matched[r][c]) {
                    if (obstacleBoard[r][c] === 'frozen') {
                        obstacleBoard[r][c] = null; // 破冰，保留构件
                    } else if (!obstacleBoard[r][c]) {
                        if (progress.hasOwnProperty(board[r][c])) progress[board[r][c]]++;
                        board[r][c] = null; // 正常消除
                    }
                }
            }
        }
        renderGoal();
        renderBoard();
        setTimeout(() => {
            dropAndFill();
            renderBoard();
            setTimeout(processMatches, 400);
        }, 300);
    }

    function dropAndFill() {
        const lv = LEVELS[currentLvlIdx];
        for (let c = 0; c < lv.size; c++) {
            let movableItems = [];
            for (let r = lv.size - 1; r >= 0; r--) {
                if (!obstacleBoard[r][c] && board[r][c] !== null) {
                    movableItems.push(board[r][c]);
                }
            }

            let itemIdx = 0;
            for (let r = lv.size - 1; r >= 0; r--) {
                if (obstacleBoard[r][c]) continue;
                if (itemIdx < movableItems.length) {
                    board[r][c] = movableItems[itemIdx];
                    itemIdx++;
                } else {
                    board[r][c] = null;
                }
            }

            const fillMats = lv.mats;
            for (let r = 0; r < lv.size; r++) {
                if (!obstacleBoard[r][c] && board[r][c] === null) {
                    board[r][c] = fillMats[Math.floor(Math.random() * fillMats.length)];
                }
            }
        }
    }

    // ====== 新增：AI 死局预测算法 ======
    function hasPossibleMoves() {
        const lv = LEVELS[currentLvlIdx];
        for (let r = 0; r < lv.size; r++) {
            for (let c = 0; c < lv.size; c++) {
                if (obstacleBoard[r][c] === 'frozen' || obstacleBoard[r][c] === 'stone-lion') continue;
                if (!board[r][c]) continue;

                // 尝试向右交换
                if (c < lv.size - 1 && obstacleBoard[r][c+1] !== 'frozen' && obstacleBoard[r][c+1] !== 'stone-lion') {
                    swapData(r, c, r, c+1);
                    let match = findMatches();
                    swapData(r, c, r, c+1); // 还原
                    if (match) return true;
                }

                // 尝试向下交换
                if (r < lv.size - 1 && obstacleBoard[r+1][c] !== 'frozen' && obstacleBoard[r+1][c] !== 'stone-lion') {
                    swapData(r, c, r+1, c);
                    let match = findMatches();
                    swapData(r, c, r+1, c); // 还原
                    if (match) return true;
                }
            }
        }
        return false;
    }

    // ====== 新增：安全洗牌算法 ======
    function safeShuffle() {
        const lv = LEVELS[currentLvlIdx];
        let maxTries = 50; // 最多尝试洗牌50次以确保没有开局自爆且有可用步数
        let movableCoords = [];
        let movableItems = [];

        // 收集所有可移动的方块
        for (let r = 0; r < lv.size; r++) {
            for (let c = 0; c < lv.size; c++) {
                if (obstacleBoard[r][c] !== 'stone-lion' && obstacleBoard[r][c] !== 'frozen' && board[r][c]) {
                    movableCoords.push({r, c});
                    movableItems.push(board[r][c]);
                }
            }
        }

        while(maxTries > 0) {
            // 打乱数组 (Fisher-Yates)
            for (let i = movableItems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [movableItems[i], movableItems[j]] = [movableItems[j], movableItems[i]];
            }

            // 填回棋盘
            for (let i=0; i < movableCoords.length; i++) {
                board[movableCoords[i].r][movableCoords[i].c] = movableItems[i];
            }

            // 验证：洗出来的盘面不能有自然连消，且必须存在合法步数
            if (!findMatches() && hasPossibleMoves()) {
                break;
            }
            maxTries--;
        }
        renderBoard();
    }

    // 分离通关判定逻辑
    function isGameWon() {
        const lv = LEVELS[currentLvlIdx];
        let win = true;
        for (let m in lv.goals) {
            if (progress[m] < lv.goals[m]) win = false;
        }
        if (lv.frozenCount) {
            for (let r=0; r<lv.size; r++) {
                for (let c=0; c<lv.size; c++) {
                    if (obstacleBoard[r][c] === 'frozen') win = false;
                }
            }
        }
        return win;
    }

    function checkWin() {
        if (isGameWon()) {
            const lv = LEVELS[currentLvlIdx];
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            
            // 判断是否是最后一关
            const isLastLevel = currentLvlIdx === LEVELS.length - 1;

            body.innerHTML = `
                <h2>🎉 营造大成</h2>
                <span class="reward-icon">${lv.rewardIcon}</span>
                <p style="font-weight:bold; color:#d32f2f; font-size: 24px;">${lv.reward}</p>
                <p style="font-size:18px; color:#5d4037; background: rgba(255,255,255,0.5); padding: 15px; border-radius: 8px;">${lv.story}</p>
                <div style="display:flex; justify-content:center; gap:20px; margin-top:30px;">
                    ${!isLastLevel ? `<button class="modal-btn" id="btn-next">下一阶段</button>` : ''}
                    <button class="modal-btn" id="btn-restart">重新开始游戏</button>
                    <button class="modal-btn" id="btn-quit" style="background: #5d4037;">退出游戏</button>
                </div>
            `;
            
            // 下一阶段按钮事件
            if (!isLastLevel) {
                document.getElementById('btn-next').onclick = () => {
                    modal.style.display = 'none';
                    currentLvlIdx++;
                    initLevel();
                };
            }

            // 重新开始游戏按钮事件
            document.getElementById('btn-restart').onclick = () => {
                currentLvlIdx = 0; // 回到第一关
                modal.style.display = 'none';
                initLevel();
            };

            // 退出游戏按钮事件
            document.getElementById('btn-quit').onclick = () => {
                window.close();
                modal.style.display = 'none';
                backToMenu();
            };

            modal.style.display = 'flex';
        }
    }

    function checkAndClear() {
        if (findMatches()) processMatches();
        else if (!hasPossibleMoves()) safeShuffle(); // 确保刚开局也不会死局
    }

    // 初始化显示主菜单
    showMainMenu();
</script>
